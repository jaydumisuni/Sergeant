name: Model-Free Core Transfer 17 Learned Closure

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-17-learned.yml"
      - "main_review/static_transfer_17_review.py"
      - "main_review/static_status_review.py"
      - "tests/test_static_transfer_17_payload_review.py"
      - "tests/test_static_transfer_17_go_review.py"
      - "tests/test_static_transfer_17_kotlin_review.py"

permissions:
  contents: read

jobs:
  learned-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout workflow event head
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Pin learned Sergeant reviewer
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach d136e1cc64c01ed2640852d9a1fb69fa18a594ee
          test "$(git rev-parse HEAD)" = "d136e1cc64c01ed2640852d9a1fb69fa18a594ee"
          test -e main_review/static_transfer_17_review.py
          grep -q 'run_static_transfer_17_review' main_review/static_status_review.py
          grep -q 'sergeant.static-status-review.v31' main_review/static_status_review.py

      - name: Checkout exact defective and fixing lineages
        shell: bash
        run: |
          set -euo pipefail

          sparse_lineage_checkout() {
            local repository="$1"
            local defective="$2"
            local fixing="$3"
            local destination="$4"
            shift 4
            git init "$destination"
            git -C "$destination" remote add origin "https://github.com/${repository}.git"
            git -C "$destination" config core.sparseCheckout true
            : > "$destination/.git/info/sparse-checkout"
            for pattern in "$@"; do printf '%s\n' "$pattern" >> "$destination/.git/info/sparse-checkout"; done
            git -C "$destination" fetch --no-tags --filter=blob:none origin "$fixing"
            git -C "$destination" fetch --no-tags --filter=blob:none origin "$defective"
            git -C "$destination" cat-file -e "${defective}^{commit}"
            git -C "$destination" cat-file -e "${fixing}^{commit}"
            git -C "$destination" merge-base --is-ancestor "$defective" "$fixing"
            git -C "$destination" checkout --detach "$defective"
            test "$(git -C "$destination" rev-parse HEAD)" = "$defective"
          }

          sparse_lineage_checkout \
            mindroom-ai/mindroom \
            354df4aa8cb8186aa72bf5b5271b34ab92d7a4c9 \
            904f490124211c24c5bf585bbbb096a834900337 \
            transfer-17-learned/mindroom \
            '/src/mindroom/matrix/cache/event_cache.py' \
            '/src/mindroom/matrix/cache/postgres_event_cache.py' \
            '/src/mindroom/matrix/cache/postgres_event_cache_events.py' \
            '/src/mindroom/matrix/cache/postgres_event_cache_threads.py' \
            '/src/mindroom/matrix/cache/sqlite_event_cache.py' \
            '/src/mindroom/matrix/cache/sqlite_event_cache_events.py' \
            '/src/mindroom/matrix/cache/sqlite_event_cache_threads.py'

          sparse_lineage_checkout \
            casosorg/kine \
            63703e5525a5d64df088b73eba8e8552609c684f \
            aad974da506091a5cc633e89eef84a45360b4c74 \
            transfer-17-learned/kine \
            '/pkg/drivers/generic/generic.go' \
            '/pkg/logstructured/sqllog/sql.go'

          sparse_lineage_checkout \
            uakihir0/planetlink \
            e04a46925891d83650a7661bd35a817af40d9f13 \
            a94eb150f6993e7cf95297016aa36751145a3ccd \
            transfer-17-learned/planetlink \
            '/tumblr/src/commonMain/kotlin/work/socialhub/planetlink/tumblr/action/TumblrMapper.kt'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-17-learned-usage.json" >> "$GITHUB_ENV"

      - name: Install learned Sergeant and proof dependency
        run: python -m pip install . pytest

      - name: Run focused positive and clean controls
        run: |
          python -m pytest \
            tests/test_static_transfer_17_payload_review.py \
            tests/test_static_transfer_17_go_review.py \
            tests/test_static_transfer_17_kotlin_review.py -q

      - name: Build learned-closure manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-transfer-17-learned
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-17-learned-closure",
              "purpose": "Learned closure for transfer 17 after immutable blind 0/3.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "classification": "learned_closure",
                  "historical_first_pass": "0/3",
                  "historical_first_pass_immutable": True,
                  "reviewer_code": "d136e1cc64c01ed2640852d9a1fb69fa18a594ee",
              },
              "cases": [
                  {
                      "case_id": "transfer-17-learned-a",
                      "repository": "mindroom-ai/mindroom",
                      "source_pr": 1590,
                      "checkout_path": "transfer-17-learned/mindroom",
                      "defective_ref": "354df4aa8cb8186aa72bf5b5271b34ab92d7a4c9",
                      "fixing_ref": "904f490124211c24c5bf585bbbb096a834900337",
                      "changed_files": [
                          "src/mindroom/matrix/cache/event_cache.py",
                          "src/mindroom/matrix/cache/postgres_event_cache.py",
                          "src/mindroom/matrix/cache/postgres_event_cache_events.py",
                          "src/mindroom/matrix/cache/postgres_event_cache_threads.py",
                          "src/mindroom/matrix/cache/sqlite_event_cache.py",
                          "src/mindroom/matrix/cache/sqlite_event_cache_events.py",
                          "src/mindroom/matrix/cache/sqlite_event_cache_threads.py"
                      ],
                      "workspace_policy": "static_first"
                  },
                  {
                      "case_id": "transfer-17-learned-b",
                      "repository": "casosorg/kine",
                      "source_pr": 1,
                      "checkout_path": "transfer-17-learned/kine",
                      "defective_ref": "63703e5525a5d64df088b73eba8e8552609c684f",
                      "fixing_ref": "aad974da506091a5cc633e89eef84a45360b4c74",
                      "changed_files": ["pkg/drivers/generic/generic.go", "pkg/logstructured/sqllog/sql.go"],
                      "workspace_policy": "static_first"
                  },
                  {
                      "case_id": "transfer-17-learned-c",
                      "repository": "uakihir0/planetlink",
                      "source_pr": 120,
                      "checkout_path": "transfer-17-learned/planetlink",
                      "defective_ref": "e04a46925891d83650a7661bd35a817af40d9f13",
                      "fixing_ref": "a94eb150f6993e7cf95297016aa36751145a3ccd",
                      "changed_files": ["tumblr/src/commonMain/kotlin/work/socialhub/planetlink/tumblr/action/TumblrMapper.kt"],
                      "workspace_policy": "static_first"
                  }
              ]
          }
          Path("build/model-free-core-transfer-17-learned/runtime-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Run learned normal pr-review
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-17-learned/runtime-manifest.json \
            --output build/model-free-core-transfer-17-learned/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-17-learned/frozen-summary.json

      - name: Enforce expected learned roots
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("build/model-free-core-transfer-17-learned/frozen-result.json").read_text())
          expected = {
              "transfer-17-learned-a": {"lower-quality-payload-can-overwrite-higher-quality-cache-entry"},
              "transfer-17-learned-b": {
                  "reserved-db-connection-escapes-through-prepared-statement",
                  "revision-allocating-append-is-not-serialized-through-commit-publication",
              },
              "transfer-17-learned-c": {"derived-collection-built-but-never-published-to-target"},
          }
          rows = {item["case"]["case_id"]: item for item in payload["full_results"]}
          for case_id, required in expected.items():
              result = rows[case_id]["result"]
              roots = {str(item.get("root_cause")) for item in result.get("officer_council", {}).get("admitted_findings", [])}
              missing = required - roots
              if missing:
                  raise SystemExit(f"{case_id} missing expected roots {sorted(missing)}; got {sorted(roots)}")
              if result.get("verdict") == "APPROVE":
                  raise SystemExit(f"{case_id} remained APPROVE")
          PY

      - name: Upload immutable learned reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-17-learned-closure
          path: build/model-free-core-transfer-17-learned/
          if-no-files-found: error
          retention-days: 90
