name: Patch pr-review static officer integration

on:
  pull_request:
    paths:
      - ".github/workflows/patch-pr-review-static-officers.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: Integrate static invariant officers into documented pr-review
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          reviewer = Path("main_review/pr_reviewer.py")
          text = reviewer.read_text(encoding="utf-8")
          import_marker = "from .standard_engine import run_standard_engine\n"
          new_import = "from .static_invariant_review import run_static_invariant_review\n"
          assert import_marker in text
          if new_import not in text:
              text = text.replace(import_marker, import_marker + new_import, 1)

          old = """    capabilities = normalize_capability_review(run_capability_engine(root_path, changed), root_path)\n    intelligence = run_review_intelligence({\"capability_review\": capabilities})\n"""
          new = """    capabilities = normalize_capability_review(run_capability_engine(root_path, changed), root_path)\n    invariant_scope = semantic_files or changed\n    invariants = run_static_invariant_review(root_path, invariant_scope)\n    merged_findings: dict[tuple[str, str, int], dict[str, Any]] = {}\n    for raw in [\n        *capabilities.get(\"findings\", []),\n        *invariants.get(\"findings\", []),\n    ]:\n        if not isinstance(raw, dict):\n            continue\n        finding = dict(raw)\n        key = (\n            str(finding.get(\"root_cause\") or finding.get(\"message\") or \"unknown\"),\n            str(finding.get(\"path\") or \"\"),\n            int(finding.get(\"line_start\") or 0),\n        )\n        merged_findings[key] = finding\n    capabilities = {\n        **capabilities,\n        \"findings\": list(merged_findings.values()),\n        \"finding_count\": len(merged_findings),\n        \"static_invariant_review\": invariants,\n    }\n    intelligence = run_review_intelligence({\"capability_review\": capabilities})\n"""
          assert old in text
          text = text.replace(old, new, 1)
          reviewer.write_text(text, encoding="utf-8")

          workflow = Path(".github/workflows/praison-browser-session-lifecycle-proof.yml")
          workflow_text = workflow.read_text(encoding="utf-8")
          marker = "      - name: Publish mechanism summary\n"
          proof_step = """      - name: Prove documented pr-review path catches the real race\n        shell: bash\n        run: |\n          python -m main_review.cli pr-review mechanism-cases/PraisonAI \\\n            --files \"src/praisonai-browser/praisonai_browser/server.py,src/praisonai-browser/praisonai_browser/sessions.py\" \\\n            --pretty > build/praison-browser-session-lifecycle/standard-pr-review.json\n          python - <<'PY'\n          import json\n          from pathlib import Path\n          packet = json.loads(\n              Path('build/praison-browser-session-lifecycle/standard-pr-review.json').read_text()\n          )\n          roots = {\n              str(item.get('root_cause'))\n              for item in packet.get('officer_council', {}).get('admitted_findings', [])\n          }\n          assert 'resource-claim-after-await' in roots, roots\n          assert 'terminal-state-without-end-timestamp' not in roots, roots\n          assert packet.get('verdict', {}).get('verdict') == 'REQUEST_CHANGES'\n          PY\n\n"""
          assert marker in workflow_text
          if "Prove documented pr-review path catches the real race" not in workflow_text:
              workflow_text = workflow_text.replace(marker, proof_step + marker, 1)
          workflow.write_text(workflow_text, encoding="utf-8")

          Path(".github/workflows/patch-pr-review-static-officers.yml").unlink()
          PY

      - name: Commit production integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Wire static invariant officers into pr-review"
          git push
