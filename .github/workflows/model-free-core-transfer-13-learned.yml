name: Model-Free Core Transfer 13 Learned Closure
# Historical provenance-corrected fresh score remains 1/3. This workflow proves only learned closure.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-13-learned.yml"
      - "scripts/run_static_training_set.py"
      - "main_review/**"

permissions:
  contents: read

jobs:
  learned-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout exact Sergeant event head
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Checkout provenance-locked defective revisions
        shell: bash
        run: |
          set -euo pipefail

          sparse_checkout() {
            local repository="$1"
            local ref="$2"
            local destination="$3"
            shift 3

            git init "$destination"
            git -C "$destination" remote add origin "https://github.com/${repository}.git"
            git -C "$destination" config core.sparseCheckout true
            : > "$destination/.git/info/sparse-checkout"
            for pattern in "$@"; do
              printf '%s\n' "$pattern" >> "$destination/.git/info/sparse-checkout"
            done
            git -C "$destination" fetch --depth=1 --filter=blob:none origin "$ref"
            git -C "$destination" checkout --detach FETCH_HEAD
            test "$(git -C "$destination" rev-parse HEAD)" = "$ref"
          }

          sparse_checkout \
            LeanerCloud/CUDly \
            5c267c5c6034153212b6a3ad688b4e141b0b6917 \
            transfer-13-learned/cudly \
            '/internal/api/db_rate_limiter.go' \
            '/internal/api/handler_accounts.go' \
            '/internal/api/handler_history.go' \
            '/internal/auth/service_apikeys.go'

          sparse_checkout \
            jedwards1230/gofer \
            946126e30d90730612d2888c61d5628d9421fcdf \
            transfer-13-learned/gofer \
            '/cmd/gofer/run.go' \
            '/cmd/gofer/service.go' \
            '/cmd/gofer/tui_app.go' \
            '/internal/daemon/hello.go' \
            '/internal/supervisor/errors.go' \
            '/internal/supervisor/supervisor.go' \
            '/internal/tui/panel.go' \
            '/internal/tuibridge/bridge.go'

          sparse_checkout \
            Mikecranesync/MIRA \
            f1521bb25b2ae592ee84d121c0b39d814f7b0474 \
            transfer-13-learned/mira \
            '/mira-bots/shared/engine.py'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-13-learned-usage.json" >> "$GITHUB_ENV"

      - name: Install exact Sergeant event head
        run: python -m pip install .

      - name: Build learned-closure manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-transfer-13-learned
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-13-learned",
              "purpose": "Learned closure for the provenance-locked transfer-13 first-pass misses. Historical fresh score remains unchanged.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "expected_defects_visible_to_sergeant": False,
                  "runtime_is_confirmation_not_discovery": True,
                  "classification": "learned_closure",
                  "historical_first_pass": "1/3",
              },
              "cases": [
                  {
                      "case_id": "transfer-13-a-learned",
                      "repository": "LeanerCloud/CUDly",
                      "source_pr": 859,
                      "checkout_path": "transfer-13-learned/cudly",
                      "defective_ref": "5c267c5c6034153212b6a3ad688b4e141b0b6917",
                      "changed_files": [
                          "internal/api/db_rate_limiter.go",
                          "internal/api/handler_accounts.go",
                          "internal/api/handler_history.go",
                          "internal/auth/service_apikeys.go",
                      ],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-13-b-learned",
                      "repository": "jedwards1230/gofer",
                      "source_pr": 148,
                      "checkout_path": "transfer-13-learned/gofer",
                      "defective_ref": "946126e30d90730612d2888c61d5628d9421fcdf",
                      "changed_files": [
                          "cmd/gofer/run.go",
                          "cmd/gofer/service.go",
                          "cmd/gofer/tui_app.go",
                          "internal/daemon/hello.go",
                          "internal/supervisor/errors.go",
                          "internal/supervisor/supervisor.go",
                          "internal/tui/panel.go",
                          "internal/tuibridge/bridge.go",
                      ],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-13-c-learned",
                      "repository": "Mikecranesync/MIRA",
                      "source_pr": 2817,
                      "checkout_path": "transfer-13-learned/mira",
                      "defective_ref": "f1521bb25b2ae592ee84d121c0b39d814f7b0474",
                      "changed_files": ["mira-bots/shared/engine.py"],
                      "workspace_policy": "static_first",
                  },
              ],
          }
          Path("build/model-free-core-transfer-13-learned/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run normal pr-review learned closure
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-13-learned/runtime-manifest.json \
            --output build/model-free-core-transfer-13-learned/learned-result.json \
            2>&1 | tee build/model-free-core-transfer-13-learned/learned-summary.json

      - name: Assert semantic learned closure
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("build/model-free-core-transfer-13-learned/learned-summary.json")
          report = json.loads(path.read_text(encoding="utf-8"))
          rows = {row["case_id"]: row for row in report["summaries"]}
          expected = {
              "transfer-13-a-learned": "detached-goroutine-without-panic-containment",
              "transfer-13-b-learned": "documented-default-selector-forwarded-without-resolution",
              "transfer-13-c-learned": "stale-snapshot-persisted-after-await",
          }
          for case_id, root in expected.items():
              row = rows.get(case_id)
              if row is None:
                  raise SystemExit(f"missing learned case: {case_id}")
              roots = {item["root_cause"] for item in row.get("admitted_roots", [])}
              if root not in roots:
                  raise SystemExit(f"{case_id} missing expected root {root}; admitted={sorted(roots)}")
              if row.get("verdict") != "REQUEST_CHANGES":
                  raise SystemExit(f"{case_id} did not request changes: {row.get('verdict')}")
          print("transfer 13 semantic learned closure: 3/3")
          PY

      - name: Publish learned closure summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Model-free Sergeant core — transfer 13 learned closure"
            echo
            echo "Exact Sergeant head: \`${GITHUB_SHA}\`"
            echo
            echo "Historical fresh result: \`1/3\` (unchanged)"
            echo
            echo '```json'
            cat build/model-free-core-transfer-13-learned/learned-summary.json 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable learned reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-13-learned
          path: build/model-free-core-transfer-13-learned/
          if-no-files-found: error
          retention-days: 90