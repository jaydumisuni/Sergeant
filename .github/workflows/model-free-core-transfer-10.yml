name: Model-Free Core Transfer 10
# Reviewer frozen before target selection: 89b953ed4e5d1e1f6dc3669185ded9f0d5447516
# First valid execution uses sparse exact-SHA checkouts; targets and reviewer are unchanged.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-10.yml"
      - "scripts/run_static_training_set.py"
      - "main_review/**"

permissions:
  contents: read

jobs:
  frozen-transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout frozen Sergeant reviewer
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Sparse checkout untouched transfer targets
        shell: bash
        run: |
          set -euo pipefail

          sparse_checkout() {
            local repository="$1"
            local ref="$2"
            local destination="$3"
            shift 3

            git init "$destination"
            git -C "$destination" remote add origin "https://github.com/${repository}.git"
            git -C "$destination" config core.sparseCheckout true
            : > "$destination/.git/info/sparse-checkout"
            for pattern in "$@"; do
              printf '%s\n' "$pattern" >> "$destination/.git/info/sparse-checkout"
            done
            git -C "$destination" fetch --depth=1 --filter=blob:none origin "$ref"
            git -C "$destination" checkout --detach FETCH_HEAD
            test "$(git -C "$destination" rev-parse HEAD)" = "$ref"
          }

          sparse_checkout \
            Greggwolin/landscape \
            c6e82a9724896b1b18860f8fde0622bb69501c8d \
            transfer-10/landscape \
            '/src/app/projects/\[projectId\]/components/tabs/PropertyTab.tsx'

          sparse_checkout \
            KanishJebaMathewM/Truxify \
            5b3b8f9af837ad2240529b00077ee5d80215e471 \
            transfer-10/truxify \
            '/apps/driver/lib/services/trip_service.dart'

          sparse_checkout \
            currentsuspect/Aestra \
            f2ee83ac6c29dd75f53ef5e50f2b811d30696e5d \
            transfer-10/aestra \
            '/AestraAudio/include/Commands/CommandRegistry.h' \
            '/AestraAudio/src/Commands/CommandRegistry.cpp'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-10-usage.json" >> "$GITHUB_ENV"

      - name: Install frozen Sergeant package
        run: python -m pip install .

      - name: Build opaque runtime manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-transfer-10
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          cases = [
              {
                  "case_id": "transfer-10-a",
                  "repository": "Greggwolin/landscape",
                  "source_pr": None,
                  "checkout_path": "transfer-10/landscape",
                  "changed_files": [
                      "src/app/projects/[projectId]/components/tabs/PropertyTab.tsx"
                  ],
              },
              {
                  "case_id": "transfer-10-b",
                  "repository": "KanishJebaMathewM/Truxify",
                  "source_pr": None,
                  "checkout_path": "transfer-10/truxify",
                  "changed_files": [
                      "apps/driver/lib/services/trip_service.dart"
                  ],
              },
              {
                  "case_id": "transfer-10-c",
                  "repository": "currentsuspect/Aestra",
                  "source_pr": None,
                  "checkout_path": "transfer-10/aestra",
                  "changed_files": [
                      "AestraAudio/include/Commands/CommandRegistry.h",
                      "AestraAudio/src/Commands/CommandRegistry.cpp"
                  ],
              },
          ]
          for case in cases:
              case["defective_ref"] = subprocess.check_output(
                  ["git", "-C", case["checkout_path"], "rev-parse", "HEAD"],
                  text=True,
              ).strip()
              case["workspace_policy"] = "static_first"

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-10",
              "purpose": "Tenth untouched transfer validation across three new repositories and ecosystems. Expected roots and later fixes remain outside Sergeant input.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "expected_defects_visible_to_sergeant": False,
                  "runtime_is_confirmation_not_discovery": True,
                  "classification": "untouched_transfer_validation",
                  "reviewer_code_frozen_before_target_selection": "89b953ed4e5d1e1f6dc3669185ded9f0d5447516"
              },
              "cases": cases,
          }
          Path("build/model-free-core-transfer-10/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run normal pr-review on untouched revisions
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-10/runtime-manifest.json \
            --output build/model-free-core-transfer-10/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-10/frozen-summary.json

      - name: Publish frozen transfer summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Model-free Sergeant core — transfer 10"
            echo
            echo "Exact Sergeant head: \`${GITHUB_SHA}\`"
            echo
            echo '```json'
            cat build/model-free-core-transfer-10/frozen-summary.json 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable transfer reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-10
          path: build/model-free-core-transfer-10/
          if-no-files-found: error
          retention-days: 90
