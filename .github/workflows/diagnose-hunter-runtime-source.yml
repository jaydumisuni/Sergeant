name: Diagnose Hunter Runtime Source

on:
  push:
    branches:
      - proof/hunter-mobile-header-20260721
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: diagnose-hunter-runtime-source-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout Sergeant proof branch
        uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Chrome is available
        run: |
          test -x /usr/bin/google-chrome
          /usr/bin/google-chrome --version

      - name: Capture exact runtime source around startup exception
        env:
          CHROME_PATH: /usr/bin/google-chrome
          HUNTER_REVIEW_URL: https://a449d774-hunter-ui-review.thetechguy712.workers.dev/portal
          PROOF_DIR: artifacts/hunter-runtime-source
        run: node tools/diagnose_hunter_runtime_source.mjs

      - name: Upload runtime source evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hunter-runtime-source
          path: artifacts/hunter-runtime-source
          if-no-files-found: error
          retention-days: 14
