name: Verify Sergeant v0.3.0 Publications

on:
  pull_request:
    paths:
      - .github/workflows/verify-v0.3.0-publications.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Verify JetBrains token is available
        shell: bash
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: test -n "$JETBRAINS_MARKETPLACE_TOKEN" || { echo 'JETBRAINS_TOKEN_MISSING'; exit 1; }

      - name: Build JetBrains plugin
        run: gradle -p adapters/jetbrains clean buildPlugin

      - name: Attempt JetBrains preview publication
        id: publish
        continue-on-error: true
        shell: bash
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          set +e
          gradle -p adapters/jetbrains publishPlugin --stacktrace > jetbrains-publish.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Print concise JetBrains registry response
        if: always()
        shell: bash
        run: |
          echo 'JETBRAINS_PUBLISH_LOG_TAIL_BEGIN'
          tail -n 120 jetbrains-publish.log || true
          echo 'JETBRAINS_PUBLISH_LOG_TAIL_END'
          echo "JETBRAINS_PUBLISH_EXIT=${{ steps.publish.outputs.status }}"

      - name: Enforce JetBrains publication result
        if: always()
        shell: bash
        run: test "${{ steps.publish.outputs.status }}" = "0"
