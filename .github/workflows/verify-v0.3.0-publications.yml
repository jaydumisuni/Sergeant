name: Verify Sergeant v0.3.0 Publications

on:
  pull_request:
    paths:
      - .github/workflows/verify-v0.3.0-publications.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Verify JetBrains token is available
        shell: bash
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: test -n "$JETBRAINS_MARKETPLACE_TOKEN" || { echo 'JETBRAINS_TOKEN_MISSING'; exit 1; }

      - name: Build JetBrains plugin
        run: gradle -p adapters/jetbrains clean buildPlugin

      - name: Publish JetBrains preview and expose registry response
        shell: bash
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          set +e
          gradle -p adapters/jetbrains publishPlugin --stacktrace 2>&1 | tee jetbrains-publish.log
          status=${PIPESTATUS[0]}
          echo "JETBRAINS_PUBLISH_EXIT=$status"
          exit "$status"
