name: Apply Cpl Failure Diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-cpl-failure-diagnostics.yml'
      - 'tools/apply_cpl_failure_diagnostics.py'

permissions:
  contents: write

jobs:
  construct:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply cleanup and safe diagnostics
        run: python tools/apply_cpl_failure_diagnostics.py

      - name: Compile product modules
        run: |
          python -m py_compile \
            main_review/cpl_noise.py \
            main_review/cpl_runtime.py \
            main_review/llm_review.py

      - name: Run full regression suite
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install -e .
          python -m pytest -q

      - name: Commit product correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            main_review/cpl_noise.py \
            main_review/cpl_runtime.py \
            main_review/llm_review.py \
            docs/38-cpl-noise-governor-and-route-failover.md \
            tests/test_cpl_noise_governor.py
          if git diff --cached --quiet; then
            echo 'Diagnostics patch already applied.'
            exit 0
          fi
          git commit -m 'Expose safe Cpl provider failure categories'
          git push origin HEAD:${{ github.head_ref }}
