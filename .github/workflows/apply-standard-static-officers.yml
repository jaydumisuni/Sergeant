name: Apply Standard Static Officers

on:
  push:
    branches:
      - train/model-free-core-campaign-2
    paths:
      - "scripts/_patch_capability_engine_static_officers.py"
      - ".github/workflows/apply-standard-static-officers.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: train/model-free-core-campaign-2
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply permanent capability integration
        run: python scripts/_patch_capability_engine_static_officers.py
      - name: Prove existing async lifecycle controls
        run: |
          python -m pip install pytest
          pytest -q tests/test_static_async_lifecycle_review.py tests/test_static_status_review.py
      - name: Remove constructor artifacts
        run: |
          rm scripts/_patch_capability_engine_static_officers.py
          rm .github/workflows/apply-standard-static-officers.yml
      - name: Commit production source only
        run: |
          git config user.name "Sergeant proof automation"
          git config user.email "actions@users.noreply.github.com"
          git add main_review/capability_engine.py scripts/_patch_capability_engine_static_officers.py .github/workflows/apply-standard-static-officers.yml
          git commit -m "Wire learned static officers into standard pr-review"
          git push origin HEAD:train/model-free-core-campaign-2
