name: Model-Free Core Transfer 12 Canonical Closure
# Learned-closure only. The authoritative fresh 0/3 artifact remains unchanged.
# Exact reviewer implementation: cc1a604b57ea91ce041c47126fc1056f74ecdc0f

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-12-canonical-closure.yml"

permissions:
  contents: read

jobs:
  learned-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout event head
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Checkout exact Sergeant reviewer
        uses: actions/checkout@v4
        with:
          ref: cc1a604b57ea91ce041c47126fc1056f74ecdc0f
          path: sergeant-reviewer
          persist-credentials: false
          fetch-depth: 1

      - name: Sparse checkout canonical transfer 12 targets
        shell: bash
        run: |
          set -euo pipefail

          sparse_checkout() {
            local repository="$1"
            local ref="$2"
            local destination="$3"
            shift 3

            git init "$destination"
            git -C "$destination" remote add origin "https://github.com/${repository}.git"
            git -C "$destination" config core.sparseCheckout true
            : > "$destination/.git/info/sparse-checkout"
            for pattern in "$@"; do
              printf '%s\n' "$pattern" >> "$destination/.git/info/sparse-checkout"
            done
            git -C "$destination" fetch --depth=1 --filter=blob:none origin "$ref"
            git -C "$destination" checkout --detach FETCH_HEAD
            test "$(git -C "$destination" rev-parse HEAD)" = "$ref"
          }

          sparse_checkout \
            rootlyhq/rootly-cli \
            826a2f537c1d722d32cd1ed8f613cf5be2fc1fcd \
            targets/rootly-cli \
            '/internal/api/client.go'

          sparse_checkout \
            VincentShipsIt/macsweep.dev \
            015475aa3b231fb6adf1cc570e1cd10285f74f32 \
            targets/macsweep \
            '/MacSweep/Sources/Core/Services/LoginItemEnumerator.swift' \
            '/MacSweep/Sources/Features/LoginItems/LoginItemsService.swift'

          sparse_checkout \
            elaris-xyz/bozPicks \
            0241560a8eccf4070519dc8e8a878c1ed1633a62 \
            targets/bozpicks \
            '/apps/web/src/app/api/markets/\[id\]/predict/route.ts' \
            '/apps/web/src/lib/vault.ts'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-12-canonical-closure-usage.json" >> "$GITHUB_ENV"

      - name: Install exact Sergeant reviewer
        run: python -m pip install ./sergeant-reviewer

      - name: Build learned-closure manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-transfer-12-canonical-closure
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-12-canonical-closure",
              "purpose": "Learned closure for the preserved canonical transfer-12 targets. This run is not fresh validation.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "expected_defects_visible_to_sergeant": False,
                  "runtime_is_confirmation_not_discovery": True,
                  "classification": "learned_closure",
                  "reviewer_code_checked_out_at": "cc1a604b57ea91ce041c47126fc1056f74ecdc0f",
                  "preserved_first_pass_record": "TTG-deploy-lab/projects/sergeant/MODEL_FREE_CORE_TRANSFER_12_FIRST_PASS.md",
              },
              "cases": [
                  {
                      "case_id": "transfer-12-a-closure",
                      "repository": "rootlyhq/rootly-cli",
                      "source_pr": 46,
                      "defective_ref": "826a2f537c1d722d32cd1ed8f613cf5be2fc1fcd",
                      "checkout_path": "targets/rootly-cli",
                      "changed_files": ["internal/api/client.go"],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-12-b-closure",
                      "repository": "VincentShipsIt/macsweep.dev",
                      "source_pr": 255,
                      "defective_ref": "015475aa3b231fb6adf1cc570e1cd10285f74f32",
                      "checkout_path": "targets/macsweep",
                      "changed_files": [
                          "MacSweep/Sources/Core/Services/LoginItemEnumerator.swift",
                          "MacSweep/Sources/Features/LoginItems/LoginItemsService.swift",
                      ],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-12-c-closure",
                      "repository": "elaris-xyz/bozPicks",
                      "source_pr": None,
                      "source_lineage": "canonical transfer-12 replacement fixture",
                      "defective_ref": "0241560a8eccf4070519dc8e8a878c1ed1633a62",
                      "checkout_path": "targets/bozpicks",
                      "changed_files": [
                          "apps/web/src/app/api/markets/[id]/predict/route.ts",
                          "apps/web/src/lib/vault.ts",
                      ],
                      "workspace_policy": "static_first",
                  },
              ],
          }
          Path("build/model-free-core-transfer-12-canonical-closure/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run normal pr-review on canonical targets
        shell: bash
        run: |
          set -o pipefail
          python sergeant-reviewer/scripts/run_static_training_set.py \
            build/model-free-core-transfer-12-canonical-closure/runtime-manifest.json \
            --output build/model-free-core-transfer-12-canonical-closure/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-12-canonical-closure/frozen-summary.json

      - name: Publish learned-closure summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Model-free Sergeant core — transfer 12 canonical learned closure"
            echo
            echo "Workflow head: \`${GITHUB_SHA}\`"
            echo
            echo "Reviewer checkout: \`cc1a604b57ea91ce041c47126fc1056f74ecdc0f\`"
            echo
            echo '```json'
            cat build/model-free-core-transfer-12-canonical-closure/frozen-summary.json 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload canonical learned-closure reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-12-canonical-closure
          path: build/model-free-core-transfer-12-canonical-closure/
          if-no-files-found: error
          retention-days: 90
