name: Build Workspace Rematch Round Two Fixes

on:
  push:
    branches:
      - certify-full-cloudflare-council-20260716
    paths:
      - scripts/apply_workspace_rematch_round2_fixes.py
      - .github/workflows/build-workspace-rematch-round2.yml

permissions:
  contents: write

jobs:
  build-rematch-round-two:
    if: ${{ !contains(github.event.head_commit.message, '[workspace-rematch-round2-built]') && !contains(github.event.head_commit.message, '[workspace-rematch-round2-diagnostic]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out exact branch
        uses: actions/checkout@v4
        with:
          ref: certify-full-cloudflare-council-20260716
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Normalize constructor quote boundary
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_workspace_rematch_round2_fixes.py')
          text = path.read_text(encoding='utf-8')
          opening = "    '''from __future__ import annotations"
          closing = "\n    ''',\n    encoding=\"utf-8\",\n)"
          if opening in text:
              text = text.replace(opening, '    """from __future__ import annotations', 1)
          if closing in text:
              text = text.replace(closing, '\n    """,\n    encoding="utf-8",\n)', 1)
          path.write_text(text, encoding='utf-8')
          PY
          python -m py_compile scripts/apply_workspace_rematch_round2_fixes.py

      - name: Apply and prove exact repair
        id: prove
        shell: bash
        run: |
          set +e
          : > /tmp/rematch-proof.log
          python scripts/apply_workspace_rematch_round2_fixes.py >> /tmp/rematch-proof.log 2>&1
          APPLY_STATUS=$?
          if [ "$APPLY_STATUS" -eq 0 ]; then
            python -m pip install -e . pytest >> /tmp/rematch-proof.log 2>&1
            INSTALL_STATUS=$?
          else
            INSTALL_STATUS=1
          fi
          if [ "$INSTALL_STATUS" -eq 0 ]; then
            python -m pytest -q \
              tests/test_workspace_rematch_round2.py \
              tests/test_workspace_ready_campaign.py \
              tests/test_coderabbit_rematch_regressions.py \
              tests/test_offline_officer_council.py \
              tests/test_pr_reviewer.py >> /tmp/rematch-proof.log 2>&1
            FOCUSED_STATUS=$?
          else
            FOCUSED_STATUS=1
          fi
          if [ "$FOCUSED_STATUS" -eq 0 ]; then
            python -m pytest -q >> /tmp/rematch-proof.log 2>&1
            FULL_STATUS=$?
          else
            FULL_STATUS=1
          fi
          if [ "$FULL_STATUS" -eq 0 ]; then
            git diff --check >> /tmp/rematch-proof.log 2>&1
            DIFF_STATUS=$?
          else
            DIFF_STATUS=1
          fi
          echo "apply=$APPLY_STATUS install=$INSTALL_STATUS focused=$FOCUSED_STATUS full=$FULL_STATUS diff=$DIFF_STATUS" >> /tmp/rematch-proof.log
          if [ "$APPLY_STATUS" -eq 0 ] && [ "$INSTALL_STATUS" -eq 0 ] && [ "$FOCUSED_STATUS" -eq 0 ] && [ "$FULL_STATUS" -eq 0 ] && [ "$DIFF_STATUS" -eq 0 ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            {
              echo '# Workspace rematch constructor diagnostic'
              echo
              echo 'The one-shot repair gate failed before publication.'
              echo
              echo '```text'
              tail -n 240 /tmp/rematch-proof.log
              echo '```'
            } > WORKSPACE_REMATCH_ROUND2_DIAGNOSTIC.md
          fi

      - name: Publish product or diagnostic commit
        run: |
          git config user.name "Sergeant Constructor"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes were produced."
            exit 1
          fi
          if [ "${{ steps.prove.outputs.passed }}" = "true" ]; then
            git commit -m "Fix workspace rematch round-two roots [workspace-rematch-round2-built]"
          else
            git commit -m "Record workspace rematch round-two diagnostic [workspace-rematch-round2-diagnostic]"
          fi
          git push origin HEAD:certify-full-cloudflare-council-20260716

      - name: Enforce product proof
        if: steps.prove.outputs.passed != 'true'
        run: exit 1
