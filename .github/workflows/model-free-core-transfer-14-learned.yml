name: Model-Free Core Transfer 14 Learned Closure
# Historical provenance-corrected fresh score remains 0/3. This workflow proves only learned closure.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-14-learned.yml"
      - "scripts/run_static_training_set.py"
      - "main_review/**"

permissions:
  contents: read

jobs:
  learned-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout exact Sergeant event head
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Checkout provenance-locked defective revisions
        shell: bash
        run: |
          set -euo pipefail

          sparse_checkout() {
            local repository="$1"
            local ref="$2"
            local destination="$3"
            shift 3

            git init "$destination"
            git -C "$destination" remote add origin "https://github.com/${repository}.git"
            git -C "$destination" config core.sparseCheckout true
            : > "$destination/.git/info/sparse-checkout"
            for pattern in "$@"; do
              printf '%s\n' "$pattern" >> "$destination/.git/info/sparse-checkout"
            done
            git -C "$destination" fetch --depth=1 --filter=blob:none origin "$ref"
            git -C "$destination" checkout --detach FETCH_HEAD
            test "$(git -C "$destination" rev-parse HEAD)" = "$ref"
          }

          sparse_checkout \
            dipeshbabu/agentloop \
            94930af7644afe2bfaa138ef963bdf7639a5c937 \
            transfer-14-learned/agentloop \
            '/agentloop/costs.py'

          sparse_checkout \
            Thatisshayan/project-sentinel \
            694fdc4faa322725c4ddf6ee038f4f8c5caf9ba8 \
            transfer-14-learned/project-sentinel \
            '/ui/app/api/action/route.ts'

          sparse_checkout \
            dmitrymomot/forge \
            f34d1ad2f0f426056e8f124209a59d5e6d9e5071 \
            transfer-14-learned/forge \
            '/web/smartlink/manager.go' \
            '/web/smartlink/resolve.go'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-14-learned-usage.json" >> "$GITHUB_ENV"

      - name: Install exact Sergeant event head
        run: python -m pip install .

      - name: Build learned-closure manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-transfer-14-learned
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-14-learned",
              "purpose": "Learned closure for the provenance-locked transfer-14 first-pass misses. Historical fresh score remains unchanged.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "expected_defects_visible_to_sergeant": False,
                  "runtime_is_confirmation_not_discovery": True,
                  "classification": "learned_closure",
                  "historical_first_pass": "0/3",
              },
              "cases": [
                  {
                      "case_id": "transfer-14-a-learned",
                      "repository": "dipeshbabu/agentloop",
                      "source_pr": 66,
                      "checkout_path": "transfer-14-learned/agentloop",
                      "defective_ref": "94930af7644afe2bfaa138ef963bdf7639a5c937",
                      "changed_files": ["agentloop/costs.py"],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-14-b-learned",
                      "repository": "Thatisshayan/project-sentinel",
                      "source_pr": 33,
                      "checkout_path": "transfer-14-learned/project-sentinel",
                      "defective_ref": "694fdc4faa322725c4ddf6ee038f4f8c5caf9ba8",
                      "changed_files": ["ui/app/api/action/route.ts"],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-14-c-learned",
                      "repository": "dmitrymomot/forge",
                      "source_pr": 71,
                      "checkout_path": "transfer-14-learned/forge",
                      "defective_ref": "f34d1ad2f0f426056e8f124209a59d5e6d9e5071",
                      "changed_files": [
                          "web/smartlink/manager.go",
                          "web/smartlink/resolve.go"
                      ],
                      "workspace_policy": "static_first",
                  },
              ],
          }
          Path("build/model-free-core-transfer-14-learned/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run normal pr-review learned closure
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-14-learned/runtime-manifest.json \
            --output build/model-free-core-transfer-14-learned/learned-result.json \
            2>&1 | tee build/model-free-core-transfer-14-learned/learned-summary.json

      - name: Assert semantic learned closure
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("build/model-free-core-transfer-14-learned/learned-summary.json")
          report = json.loads(path.read_text(encoding="utf-8"))
          rows = {row["case_id"]: row for row in report["summaries"]}
          expected = {
              "transfer-14-a-learned": "unknown-external-entity-assigned-synthetic-measurement",
              "transfer-14-b-learned": "generic-proxy-exact-path-policy-cannot-authorize-parameterized-routes",
              "transfer-14-c-learned": "read-through-cache-writeback-not-ordered-with-invalidation",
          }
          for case_id, root in expected.items():
              row = rows.get(case_id)
              if row is None:
                  raise SystemExit(f"missing learned case: {case_id}")
              roots = {item["root_cause"] for item in row.get("admitted_roots", [])}
              if root not in roots:
                  raise SystemExit(f"{case_id} missing expected root {root}; admitted={sorted(roots)}")
              if row.get("verdict") != "REQUEST_CHANGES":
                  raise SystemExit(f"{case_id} did not request changes: {row.get('verdict')}")
          print("transfer 14 semantic learned closure: 3/3")
          PY

      - name: Publish learned closure summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Model-free Sergeant core — transfer 14 learned closure"
            echo
            echo "Exact Sergeant head: \`${GITHUB_SHA}\`"
            echo
            echo "Historical fresh result: \`0/3\` (unchanged)"
            echo
            echo '```json'
            cat build/model-free-core-transfer-14-learned/learned-summary.json 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable learned reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-14-learned
          path: build/model-free-core-transfer-14-learned/
          if-no-files-found: error
          retention-days: 90