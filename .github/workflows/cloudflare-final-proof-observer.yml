name: Cloudflare Final Proof Observer

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/cloudflare-final-proof-observer.yml'

permissions:
  contents: read
  actions: read

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - name: Recover latest manual certification run
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          repo = os.environ['REPOSITORY']
          token = os.environ['GH_TOKEN']
          params = urllib.parse.urlencode({
              'event': 'workflow_dispatch',
              'branch': 'main',
              'per_page': 20,
          })
          url = (
              f'https://api.github.com/repos/{repo}/actions/workflows/'
              f'cloudflare-live-certification.yml/runs?{params}'
          )
          request = urllib.request.Request(
              url,
              headers={
                  'Accept': 'application/vnd.github+json',
                  'Authorization': f'Bearer {token}',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'User-Agent': 'sergeant-final-proof-observer',
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.load(response)
          runs = payload.get('workflow_runs', [])
          if not runs:
              raise SystemExit('No manual Cloudflare certification run found.')
          run = runs[0]
          safe = {
              'id': run.get('id'),
              'run_number': run.get('run_number'),
              'status': run.get('status'),
              'conclusion': run.get('conclusion'),
              'head_branch': run.get('head_branch'),
              'head_sha': run.get('head_sha'),
              'created_at': run.get('created_at'),
              'updated_at': run.get('updated_at'),
              'html_url': run.get('html_url'),
              'display_title': run.get('display_title'),
          }
          with open('cloudflare-final-proof-run.json', 'w', encoding='utf-8') as handle:
              json.dump(safe, handle, indent=2, sort_keys=True)
          print(json.dumps(safe, indent=2, sort_keys=True))
          PY

      - name: Upload run metadata
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-final-proof-run-observer
          path: cloudflare-final-proof-run.json
          if-no-files-found: error
          retention-days: 1
