name: Temporary Wire Transfer 15

on:
  push:
    branches:
      - train/model-free-core-campaign-2
    paths:
      - .github/workflows/temp-wire-transfer15.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: train/model-free-core-campaign-2
          fetch-depth: 0

      - name: Wire transfer 15 into canonical status review
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('main_review/static_status_review.py')
          text = path.read_text(encoding='utf-8')
          replacements = (
              (
                  'from .static_transfer_14_review import run_static_transfer_14_review\n',
                  'from .static_transfer_14_review import run_static_transfer_14_review\n'
                  'from .static_transfer_15_review import run_static_transfer_15_review\n',
              ),
              (
                  '    transfer_14 = run_static_transfer_14_review(root_path, transfer_14_changed)\n'
                  '    selector_continuity = run_static_selector_continuity_review(root_path, changed)\n',
                  '    transfer_14 = run_static_transfer_14_review(root_path, transfer_14_changed)\n'
                  '    transfer_15 = run_static_transfer_15_review(root_path, transfer_14_changed)\n'
                  '    selector_continuity = run_static_selector_continuity_review(root_path, changed)\n',
              ),
              (
                  '        transfer_14,\n'
                  '        selector_continuity,\n',
                  '        transfer_14,\n'
                  '        transfer_15,\n'
                  '        selector_continuity,\n',
              ),
              (
                  '        "schema_version": "sergeant.static-status-review.v28",\n',
                  '        "schema_version": "sergeant.static-status-review.v29",\n',
              ),
              (
                  '        "static_transfer_14_review": transfer_14,\n'
                  '        "static_selector_continuity_review": selector_continuity,\n',
                  '        "static_transfer_14_review": transfer_14,\n'
                  '        "static_transfer_15_review": transfer_15,\n'
                  '        "static_selector_continuity_review": selector_continuity,\n',
              ),
          )
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one replacement target, found {count}: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Run focused positive and clean controls
        shell: bash
        run: |
          python -m pip install --quiet -e . pytest
          python -m pytest tests/test_static_transfer_15_review.py -q

      - name: Commit production wiring and remove constructor
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add main_review/static_status_review.py
          git rm .github/workflows/temp-wire-transfer15.yml
          git commit -m 'Wire transfer 15 officers into status review'
          git push origin HEAD:train/model-free-core-campaign-2
