name: Apply PR 102 Final Review Fixes

on:
  push:
    branches: [cpl-quality-noise-governor]
    paths:
      - scripts/apply_pr102_final_review_fixes.py
      - .github/workflows/apply-pr102-final-review-fixes.yml
  pull_request:
    branches: [main]
    paths:
      - scripts/apply_pr102_final_review_fixes.py
      - .github/workflows/apply-pr102-final-review-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.ref == 'cpl-quality-noise-governor' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cpl-quality-noise-governor
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install -e '.[dev]' pytest
      - name: Apply product and regression corrections
        run: python scripts/apply_pr102_final_review_fixes.py
      - name: Make synthetic-route regression explicit
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/test_pr102_final_review_regressions.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'from main_review.llm_provider import LLMProviderError, LLMRoute',
              'from main_review.llm_provider import LLMProviderError, LLMRoute, LLMSettings',
          )
          replacement = (
              '    synthetic_settings = LLMSettings(\n'
              '        enabled=True,\n'
              '        policy="preferred",\n'
              '        provider="configured",\n'
              '        base_url="http://127.0.0.1:8082/v1",\n'
              '        model="model-a",\n'
              '        protocol="chat_completions",\n'
              '        api_key="",\n'
              '        timeout_seconds=1.0,\n'
              '        max_output_tokens=256,\n'
              '    )\n'
              '    result = llm_review.run_cpl_review(\n'
              '        tmp_path,\n'
              '        [],\n'
              '        {},\n'
              '        settings=synthetic_settings,\n'
              '        route=route(),\n'
              '    )'
          )
          original = '    result = llm_review.run_cpl_review(tmp_path, [], {}, route=route())'
          if text.count(original) != 1:
              raise SystemExit(f'expected one synthetic run call, found {text.count(original)}')
          path.write_text(text.replace(original, replacement, 1), encoding='utf-8')
          PY
      - name: Run focused proof
        shell: bash
        run: |
          set +e
          python -m pytest \
            tests/test_pr102_final_review_regressions.py \
            tests/test_cpl_noise_governor.py \
            tests/test_coderabbit_rematch_regressions.py \
            -q > focused-proof.log 2>&1
          status=$?
          cat focused-proof.log
          exit $status
      - name: Upload focused proof output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr102-final-review-focused-proof
          path: focused-proof.log
          if-no-files-found: error
      - name: Commit corrected product head
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main_review/cpl_council.py main_review/llm_provider.py main_review/llm_review.py main_review/cpl_runtime.py tests/test_pr102_final_review_regressions.py
          git commit -m "Resolve final Cpl failover and authorization review findings"
          git push origin HEAD:cpl-quality-noise-governor
