name: Apply Transfer 13 Noise Fix

on:
  pull_request:
    paths:
      - ".github/workflows/apply-transfer-13-noise-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: train/model-free-core-campaign-2
          fetch-depth: 0
          persist-credentials: true

      - name: Tighten goroutine admission and add clean controls
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('main_review/static_transfer_13_review.py')
          text = path.read_text(encoding='utf-8')

          marker = '''def _body_has_nontrivial_work(body: str) -> bool:
    scrubbed = re.sub(r"\\b(?:recover|panic|close|len|cap|append|make|new)\\s*\\(", "", body)
'''
          helper = '''def _body_is_lock_scoped_mutation_only(body: str) -> bool:
    """Return true for a tiny critical section with no arbitrary call surface."""
    if re.search(r"\\b[A-Za-z_][A-Za-z0-9_]*\\.Lock\\s*\\(\\s*\\)", body) is None:
        return False
    if re.search(r"\\b[A-Za-z_][A-Za-z0-9_]*\\.Unlock\\s*\\(\\s*\\)", body) is None:
        return False

    scrubbed = re.sub(r"//[^\\n]*|/\\*[\\s\\S]*?\\*/", "", body)
    scrubbed = re.sub(r"\\bdefer\\s+", "", scrubbed)
    scrubbed = re.sub(
        r"\\b[A-Za-z_][A-Za-z0-9_]*\\.(?:R?Lock|R?Unlock)\\s*\\(\\s*\\)\\s*;?",
        "",
        scrubbed,
    )
    scrubbed = re.sub(
        r"\\b[A-Za-z_][A-Za-z0-9_]*(?:\\.[A-Za-z_][A-Za-z0-9_]*)*\\s*(?:\\+\\+|--)\\s*;?",
        "",
        scrubbed,
    )
    scrubbed = re.sub(
        r"\\b[A-Za-z_][A-Za-z0-9_]*(?:\\.[A-Za-z_][A-Za-z0-9_]*)*\\s*"
        r"(?:\\+=|-=|\\*=|/=|=)\\s*(?:[A-Za-z_][A-Za-z0-9_.]*|[-+]?\\d+(?:\\.\\d+)?)\\s*;?",
        "",
        scrubbed,
    )
    return re.sub(r"[{};\\s]", "", scrubbed) == ""


'''
          if helper not in text:
              assert marker in text
              text = text.replace(marker, helper + marker, 1)

          old_anonymous = '''        if re.search(r"\\brecover\\s*\\(", body):
            continue
        if not _body_has_nontrivial_work(body):
            continue
'''
          new_anonymous = '''        if re.search(r"\\brecover\\s*\\(", body):
            continue
        if _body_is_lock_scoped_mutation_only(body):
            continue
        if not _body_has_nontrivial_work(body):
            continue
'''
          assert old_anonymous in text
          text = text.replace(old_anonymous, new_anonymous, 1)

          old_direct = '''        target = functions.get(match.group("name"))
        if target is not None and re.search(r"\\brecover\\s*\\(", target):
            continue
'''
          new_direct = '''        target = functions.get(match.group("name"))
        if target is not None and (
            re.search(r"\\brecover\\s*\\(", target)
            or _body_is_lock_scoped_mutation_only(target)
        ):
            continue
'''
          assert old_direct in text
          text = text.replace(old_direct, new_direct, 1)
          path.write_text(text, encoding='utf-8')

          test_path = Path('tests/test_static_transfer_13_lock_noise.py')
          test_path.write_text('''from __future__ import annotations

from pathlib import Path

from main_review.static_transfer_13_review import run_static_transfer_13_review


ROOT = "detached-goroutine-without-panic-containment"


def _roots(result: dict) -> set[str]:
    return {str(item.get("root_cause")) for item in result.get("findings", [])}


def test_anonymous_lock_scoped_counter_mutation_is_clean(tmp_path: Path) -> None:
    source = tmp_path / "counter.go"
    source.write_text(
        """package internal
func update() {
    go func() {
        mu.Lock()
        sharedCounter++
        mu.Unlock()
    }()
}
""",
        encoding="utf-8",
    )
    assert ROOT not in _roots(run_static_transfer_13_review(tmp_path, ["counter.go"]))


def test_direct_lock_scoped_counter_mutation_is_clean(tmp_path: Path) -> None:
    source = tmp_path / "counter.go"
    source.write_text(
        """package internal
func update() { go increment() }
func increment() {
    mu.Lock()
    sharedCounter += 1
    mu.Unlock()
}
""",
        encoding="utf-8",
    )
    assert ROOT not in _roots(run_static_transfer_13_review(tmp_path, ["counter.go"]))


def test_lock_scoped_arbitrary_store_call_still_gates(tmp_path: Path) -> None:
    source = tmp_path / "worker.go"
    source.write_text(
        """package internal
func update(store *Store) {
    go func() {
        mu.Lock()
        store.Refresh()
        mu.Unlock()
    }()
}
""",
        encoding="utf-8",
    )
    assert ROOT in _roots(run_static_transfer_13_review(tmp_path, ["worker.go"]))
''', encoding='utf-8')
          PY

          rm .github/workflows/apply-transfer-13-noise-fix.yml
          git config user.name "Sergeant Constructor"
          git config user.email "actions@users.noreply.github.com"
          git add main_review/static_transfer_13_review.py tests/test_static_transfer_13_lock_noise.py .github/workflows/apply-transfer-13-noise-fix.yml
          git commit -m "Calibrate detached goroutine admission"
          git push origin HEAD:train/model-free-core-campaign-2
