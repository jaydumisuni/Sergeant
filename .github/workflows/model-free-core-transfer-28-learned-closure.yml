name: Model-Free Core Transfer 28 Learned Closure

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-28-learned-closure.yml"

permissions:
  contents: read

jobs:
  learned-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"
      REVIEWER_SHA: 5cea3d7ae5478749c50bab2d7118cfcb89145576

    steps:
      - name: Checkout workflow event head
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Pin learned reviewer
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach "${REVIEWER_SHA}"
          test "$(git rev-parse HEAD)" = "${REVIEWER_SHA}"
          test -e main_review/static_transfer_28_review.py
          grep -q 'sergeant.static-transfer-28-review.v1' main_review/static_transfer_28_review.py
          grep -q 'static_transfer_28_review' main_review/static_remote_contract_review.py
          grep -q 'sergeant.static-remote-contract-review.v8' main_review/static_remote_contract_review.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install focused test dependency
        run: python -m pip install pytest

      - name: Prepare evidence and prove controls
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          mkdir -p build/model-free-core-transfer-28-learned
          python -m pytest -q tests/test_static_transfer_28_review.py \
            2>&1 | tee build/model-free-core-transfer-28-learned/controls.log

      - name: Checkout frozen defective snapshots
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import subprocess
          from pathlib import Path

          cases = [
              (
                  "ziglang/zig",
                  "181b25ce4fcebc32f6fdc7498148c0f5e131dda9",
                  "58ea5df341c4f5d68eea35d2a1bfd871c86f9db2",
                  ["lib/std/zig/AstGen.zig"],
              ),
              (
                  "tidyverse/dplyr",
                  "7e4e31e62fb2bfeff3275e796e81748ca0ee2f67",
                  "809409f4877b1b1bba48f00865ac72cde76c6fd9",
                  ["R/data-mask.R", "R/reframe.R", "R/summarise.R"],
              ),
              (
                  "erlang/otp",
                  "12d7fd688d75488b82143b967897cfc48f1c43de",
                  "6552e962fee833e88e27bd0773120a48c09966e0",
                  ["lib/common_test/src/cth_surefire.erl"],
              ),
          ]

          for index, (repository, defective, fixing, files) in enumerate(cases, start=1):
              destination = Path("transfer-28-learned") / f"case-{index}"
              destination.mkdir(parents=True, exist_ok=False)
              subprocess.run(["git", "init", str(destination)], check=True)
              subprocess.run(
                  ["git", "-C", str(destination), "remote", "add", "origin", f"https://github.com/{repository}.git"],
                  check=True,
              )
              subprocess.run(["git", "-C", str(destination), "config", "core.sparseCheckout", "true"], check=True)
              (destination / ".git" / "info" / "sparse-checkout").write_text(
                  "".join(f"/{path}\n" for path in files), encoding="utf-8"
              )
              for ref in (fixing, defective):
                  subprocess.run(
                      ["git", "-C", str(destination), "fetch", "--no-tags", "--filter=blob:none", "origin", ref],
                      check=True,
                  )
              subprocess.run(
                  ["git", "-C", str(destination), "merge-base", "--is-ancestor", defective, fixing],
                  check=True,
              )
              subprocess.run(["git", "-C", str(destination), "checkout", "--detach", defective], check=True)
              actual = subprocess.check_output(
                  ["git", "-C", str(destination), "rev-parse", "HEAD"], text=True
              ).strip()
              if actual != defective:
                  raise SystemExit(f"checkout identity mismatch for {repository}")
              for relative in files:
                  if not (destination / relative).is_file():
                      raise SystemExit(f"requested source missing: {repository}:{relative}")
          PY

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-28-learned-usage.json" >> "$GITHUB_ENV"

      - name: Install pinned Sergeant package
        run: python -m pip install .

      - name: Build learned-only manifest
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-28-learned",
              "purpose": "Learned closure for the immutable transfer-28 false negatives; the original 0/3 fresh score remains unchanged.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "expected_defects_visible_to_sergeant": False,
                  "runtime_is_confirmation_not_discovery": True,
                  "classification": "learned_closure_only",
                  "frozen_first_pass_run": 29776082016,
                  "frozen_first_pass_artifact": 8474718008,
                  "frozen_first_pass_digest": "sha256:e201003fe69b8e3c52d134ab868b50c2ad11b27b84c152af7a36f0b563f6f42a",
                  "reviewer_code": "5cea3d7ae5478749c50bab2d7118cfcb89145576",
              },
              "cases": [
                  {
                      "case_id": "transfer-28-a",
                      "repository": "ziglang/zig",
                      "source_pr": 25910,
                      "defective_ref": "181b25ce4fcebc32f6fdc7498148c0f5e131dda9",
                      "fixing_ref": "58ea5df341c4f5d68eea35d2a1bfd871c86f9db2",
                      "checkout_path": "transfer-28-learned/case-1",
                      "changed_files": ["lib/std/zig/AstGen.zig"],
                      "workspace_policy": "static_first"
                  },
                  {
                      "case_id": "transfer-28-b",
                      "repository": "tidyverse/dplyr",
                      "source_pr": 7799,
                      "defective_ref": "7e4e31e62fb2bfeff3275e796e81748ca0ee2f67",
                      "fixing_ref": "809409f4877b1b1bba48f00865ac72cde76c6fd9",
                      "checkout_path": "transfer-28-learned/case-2",
                      "changed_files": ["R/data-mask.R", "R/reframe.R", "R/summarise.R"],
                      "workspace_policy": "static_first"
                  },
                  {
                      "case_id": "transfer-28-c",
                      "repository": "erlang/otp",
                      "source_pr": 9419,
                      "defective_ref": "12d7fd688d75488b82143b967897cfc48f1c43de",
                      "fixing_ref": "6552e962fee833e88e27bd0773120a48c09966e0",
                      "checkout_path": "transfer-28-learned/case-3",
                      "changed_files": ["lib/common_test/src/cth_surefire.erl"],
                      "workspace_policy": "static_first"
                  }
              ]
          }
          Path("build/model-free-core-transfer-28-learned/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n", encoding="utf-8"
          )
          PY

      - name: Run normal pr-review learned closure
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-28-learned/runtime-manifest.json \
            --output build/model-free-core-transfer-28-learned/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-28-learned/frozen-summary.json

      - name: Publish learned summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Model-free Sergeant core — transfer 28 learned closure"
            echo
            echo "Workflow event head: \`${GITHUB_SHA}\`"
            echo "Pinned reviewer: \`${REVIEWER_SHA}\`"
            echo "Original fresh result remains: \`0/3\`"
            echo
            echo '```json'
            cat build/model-free-core-transfer-28-learned/frozen-summary.json 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable learned reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-28-learned
          path: build/model-free-core-transfer-28-learned/
          if-no-files-found: error
          retention-days: 90
