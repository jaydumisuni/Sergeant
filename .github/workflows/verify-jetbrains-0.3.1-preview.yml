name: Verify JetBrains 0.3.1 Preview

on:
  pull_request:
    paths:
      - .github/workflows/verify-jetbrains-0.3.1-preview.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.0.0"

      - name: Verify JetBrains token
        shell: bash
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: test -n "$JETBRAINS_MARKETPLACE_TOKEN" || { echo JETBRAINS_TOKEN_MISSING; exit 1; }

      - name: Build corrected preview
        run: gradle -p adapters/jetbrains clean buildPlugin

      - name: Attempt 0.3.1 preview publication
        id: publish
        continue-on-error: true
        shell: bash
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: |
          set +e
          gradle -p adapters/jetbrains publishPlugin --stacktrace > jetbrains-0.3.1-publish.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload JetBrains publication response
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jetbrains-0.3.1-publish-log
          path: jetbrains-0.3.1-publish.log
          if-no-files-found: error

      - name: Report publication exit code
        if: always()
        run: echo "JETBRAINS_0_3_1_PUBLISH_EXIT=${{ steps.publish.outputs.status }}"
