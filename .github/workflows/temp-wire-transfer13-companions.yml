name: Temporary Wire Transfer 13 Companions

on:
  push:
    branches:
      - train/model-free-core-campaign-2
    paths:
      - .github/workflows/temp-wire-transfer13-companions.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: train/model-free-core-campaign-2
          fetch-depth: 0

      - name: Wire companion officers into canonical status review
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("main_review/static_status_review.py")
          text = path.read_text(encoding="utf-8")

          replacements = (
              (
                  "from .static_python_cancellation_review import run_static_python_cancellation_review\n",
                  "from .static_preawait_durability_review import run_static_preawait_durability_review\n"
                  "from .static_python_cancellation_review import run_static_python_cancellation_review\n",
              ),
              (
                  "from .static_remote_contract_review import run_static_remote_contract_review\n",
                  "from .static_remote_contract_review import run_static_remote_contract_review\n"
                  "from .static_selector_continuity_review import run_static_selector_continuity_review\n",
              ),
              (
                  "    transfer_13 = run_static_transfer_13_review(root_path, changed)\n"
                  "    url_path_contract = run_static_url_path_contract_review(root_path, changed)\n",
                  "    transfer_13 = run_static_transfer_13_review(root_path, changed)\n"
                  "    selector_continuity = run_static_selector_continuity_review(root_path, changed)\n"
                  "    preawait_durability = run_static_preawait_durability_review(root_path, changed)\n"
                  "    url_path_contract = run_static_url_path_contract_review(root_path, changed)\n",
              ),
              (
                  "        transfer_13,\n"
                  "        url_path_contract,\n",
                  "        transfer_13,\n"
                  "        selector_continuity,\n"
                  "        preawait_durability,\n"
                  "        url_path_contract,\n",
              ),
              (
                  '        "schema_version": "sergeant.static-status-review.v25",\n',
                  '        "schema_version": "sergeant.static-status-review.v26",\n',
              ),
              (
                  '        "static_transfer_13_review": transfer_13,\n'
                  '        "static_url_path_contract_review": url_path_contract,\n',
                  '        "static_transfer_13_review": transfer_13,\n'
                  '        "static_selector_continuity_review": selector_continuity,\n'
                  '        "static_preawait_durability_review": preawait_durability,\n'
                  '        "static_url_path_contract_review": url_path_contract,\n',
              ),
          )

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one replacement target, found {count}: {old!r}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Run focused regression
        shell: bash
        run: |
          python -m pip install --quiet -e . pytest
          python -m pytest tests/test_static_transfer_13_companion_review.py -q

      - name: Commit production correction and remove constructor
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main_review/static_status_review.py
          git rm .github/workflows/temp-wire-transfer13-companions.yml
          git commit -m "Wire transfer 13 companion officers into status review"
          git push origin HEAD:train/model-free-core-campaign-2
