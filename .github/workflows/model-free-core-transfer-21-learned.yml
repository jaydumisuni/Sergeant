name: Model-Free Core Transfer 21 Learned Closure
# Learned reviewer frozen after transfer 21's provenance-valid 0/1 first pass: 9e1c0c9fbce0fe0579f1d42580cdd811b7baa112

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-21-learned.yml"
      - "main_review/static_transfer_21_review.py"
      - "main_review/static_remote_contract_review.py"
      - "tests/test_static_transfer_21_review.py"

permissions:
  contents: read

jobs:
  learned-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout workflow event head
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Pin learned Sergeant reviewer
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach 9e1c0c9fbce0fe0579f1d42580cdd811b7baa112
          test "$(git rev-parse HEAD)" = "9e1c0c9fbce0fe0579f1d42580cdd811b7baa112"
          test -e main_review/static_transfer_21_review.py
          grep -q 'sergeant.static-remote-contract-review.v2' main_review/static_remote_contract_review.py
          grep -q 'sergeant.static-status-review.v34' main_review/static_status_review.py

      - name: Checkout exact .NET defective and fixing lineage
        shell: bash
        run: |
          set -euo pipefail
          destination=transfer-21/dotnet-runtime
          defective=0884fe15bef5c4e5e4b767a2ecc6594e05635cde
          fixing=8dffdb95201ada3b7ee3fc4211a7917fed15cc1b
          git init "$destination"
          git -C "$destination" remote add origin https://github.com/dotnet/runtime.git
          git -C "$destination" config core.sparseCheckout true
          cat > "$destination/.git/info/sparse-checkout" <<'EOF'
          /src/native/managed/cdac/Microsoft.Diagnostics.DataContractReader.Abstractions/Contracts/IThread.cs
          /src/native/managed/cdac/Microsoft.Diagnostics.DataContractReader.Contracts/Contracts/Thread_1.cs
          /src/native/managed/cdac/Microsoft.Diagnostics.DataContractReader.Legacy/SOSDacImpl.cs
          EOF
          git -C "$destination" fetch --no-tags --filter=blob:none origin "$fixing"
          git -C "$destination" fetch --no-tags --filter=blob:none origin "$defective"
          git -C "$destination" cat-file -e "${defective}^{commit}"
          git -C "$destination" cat-file -e "${fixing}^{commit}"
          git -C "$destination" merge-base --is-ancestor "$defective" "$fixing"
          git -C "$destination" checkout --detach "$defective"
          test "$(git -C "$destination" rev-parse HEAD)" = "$defective"
          test -f "$destination/src/native/managed/cdac/Microsoft.Diagnostics.DataContractReader.Abstractions/Contracts/IThread.cs"
          test -f "$destination/src/native/managed/cdac/Microsoft.Diagnostics.DataContractReader.Contracts/Contracts/Thread_1.cs"
          test -f "$destination/src/native/managed/cdac/Microsoft.Diagnostics.DataContractReader.Legacy/SOSDacImpl.cs"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-21-learned-usage.json" >> "$GITHUB_ENV"

      - name: Install learned Sergeant package and test runner
        run: python -m pip install . pytest

      - name: Run focused transfer 21 controls
        run: python -m pytest -q tests/test_static_transfer_21_review.py tests/test_pr_review_static_invariant_integration.py

      - name: Build learned closure manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-transfer-21-learned
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-21-learned",
              "purpose": "Learned closure only. Transfer 21 historical fresh result remains 0/1 valid; Prometheus and Spring are excluded because they did not represent product defects.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "classification": "learned_closure",
                  "historical_fresh_score_immutable": True,
                  "reviewer_code": "9e1c0c9fbce0fe0579f1d42580cdd811b7baa112"
              },
              "cases": [{
                  "case_id": "transfer-21-c",
                  "repository": "dotnet/runtime",
                  "source_pr": 130029,
                  "checkout_path": "transfer-21/dotnet-runtime",
                  "defective_ref": "0884fe15bef5c4e5e4b767a2ecc6594e05635cde",
                  "fixing_ref": "8dffdb95201ada3b7ee3fc4211a7917fed15cc1b",
                  "changed_files": [
                      "src/native/managed/cdac/Microsoft.Diagnostics.DataContractReader.Abstractions/Contracts/IThread.cs",
                      "src/native/managed/cdac/Microsoft.Diagnostics.DataContractReader.Contracts/Contracts/Thread_1.cs",
                      "src/native/managed/cdac/Microsoft.Diagnostics.DataContractReader.Legacy/SOSDacImpl.cs"
                  ],
                  "workspace_policy": "static_first"
              }]
          }
          Path("build/model-free-core-transfer-21-learned/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n", encoding="utf-8"
          )
          PY

      - name: Run learned normal pr-review
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-21-learned/runtime-manifest.json \
            --output build/model-free-core-transfer-21-learned/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-21-learned/frozen-summary.json

      - name: Verify exact learned root
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("build/model-free-core-transfer-21-learned/frozen-result.json").read_text(encoding="utf-8"))
          summaries = result.get("summaries", [])
          if len(summaries) != 1:
              raise SystemExit(f"expected one summary, got {len(summaries)}")
          summary = summaries[0]
          roots = {str(row.get("root_cause")) for row in summary.get("admitted_roots", [])}
          expected = "contract-result-field-discarded-by-adapter-default"
          if expected not in roots:
              raise SystemExit(f"expected learned root missing: {sorted(roots)}")
          if summary.get("verdict") == "APPROVE":
              raise SystemExit("learned closure incorrectly approved defective revision")
          if int(summary.get("model_calls") or 0) != 0:
              raise SystemExit("model call detected in model-free learned closure")
          PY

      - name: Upload immutable learned reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-21-learned
          path: build/model-free-core-transfer-21-learned/
          if-no-files-found: error
          retention-days: 90
