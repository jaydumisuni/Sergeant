name: Construct Transfer 16 Review

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/construct-transfer-16-review.yml"

permissions:
  contents: write

jobs:
  construct:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Wire transfer 16 officer
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("main_review/static_status_review.py")
          text = path.read_text(encoding="utf-8")

          import_line = "from .static_transfer_16_review import run_static_transfer_16_review\n"
          if import_line not in text:
              anchor = "from .static_transfer_15_review import run_static_transfer_15_review\n"
              if anchor not in text:
                  raise SystemExit("transfer 15 import anchor missing")
              text = text.replace(anchor, anchor + import_line, 1)

          invocation = "    transfer_16 = run_static_transfer_16_review(root_path, transfer_14_changed)\n"
          if invocation not in text:
              anchor = "    transfer_15 = run_static_transfer_15_review(root_path, transfer_14_changed)\n"
              if anchor not in text:
                  raise SystemExit("transfer 15 invocation anchor missing")
              text = text.replace(anchor, anchor + invocation, 1)

          tuple_line = "        transfer_16,\n"
          if tuple_line not in text:
              anchor = "        transfer_15,\n"
              if anchor not in text:
                  raise SystemExit("transfer 15 tuple anchor missing")
              text = text.replace(anchor, anchor + tuple_line, 1)

          return_line = '        "static_transfer_16_review": transfer_16,\n'
          if return_line not in text:
              anchor = '        "static_transfer_15_review": transfer_15,\n'
              if anchor not in text:
                  raise SystemExit("transfer 15 return anchor missing")
              text = text.replace(anchor, anchor + return_line, 1)

          text = text.replace(
              '"schema_version": "sergeant.static-status-review.v29",',
              '"schema_version": "sergeant.static-status-review.v30",',
              1,
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove constructor and commit
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/construct-transfer-16-review.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main_review/static_status_review.py
          git commit -m "Connect transfer 16 officers to normal pr-review"
          git push origin HEAD:${{ github.head_ref }}
