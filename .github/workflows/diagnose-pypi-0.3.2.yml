name: Diagnose PyPI 0.3.2

on:
  pull_request:
    paths:
      - .github/workflows/diagnose-pypi-0.3.2.yml

permissions:
  actions: read
  contents: read
  deployments: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect pypi environment policy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          echo 'ENVIRONMENT_POLICY'
          gh api repos/jaydumisuni/Sergeant/environments/pypi \
            --jq '{name,protection_rules,deployment_branch_policy}' || true
          echo 'CUSTOM_BRANCH_POLICIES'
          gh api repos/jaydumisuni/Sergeant/environments/pypi/deployment-branch-policies \
            --jq '{total_count,branch_policies}' || true

      - name: Inspect recent pypi deployments
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          gh api 'repos/jaydumisuni/Sergeant/deployments?environment=pypi&per_page=15' \
            --jq '[.[] | {id,ref,sha,environment,task,created_at,creator:.creator.login}]' \
            > deployments.json || true
          cat deployments.json || true
          python - <<'PY' > deployment-ids.txt
          import json
          try:
              items=json.load(open('deployments.json'))
          except Exception:
              items=[]
          for item in items:
              print(item.get('id',''))
          PY
          while read -r DEPLOYMENT_ID; do
            [ -z "$DEPLOYMENT_ID" ] && continue
            echo "STATUS $DEPLOYMENT_ID"
            gh api "repos/jaydumisuni/Sergeant/deployments/$DEPLOYMENT_ID/statuses" \
              --jq '[.[] | {state,description,environment,created_at,creator:.creator.login}]' || true
          done < deployment-ids.txt
