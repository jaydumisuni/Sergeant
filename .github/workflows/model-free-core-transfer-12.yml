name: Model-Free Core Transfer 12
# Reviewer frozen before target selection: d58048a3c4d26607f6f21f12294ef0d1289a3bdf

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/model-free-core-transfer-12.yml"

permissions:
  contents: read

jobs:
  frozen-transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SERGEANT_LLM_ENABLED: "false"
      SERGEANT_CPL_ENABLED: "false"
      SERGEANT_CPL_POLICY: "disabled"

    steps:
      - name: Checkout workflow event head
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Pin frozen Sergeant reviewer
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach d58048a3c4d26607f6f21f12294ef0d1289a3bdf
          test "$(git rev-parse HEAD)" = "d58048a3c4d26607f6f21f12294ef0d1289a3bdf"

      - name: Sparse checkout untouched transfer lineages
        shell: bash
        run: |
          set -euo pipefail

          sparse_lineage_checkout() {
            local repository="$1"
            local defective="$2"
            local fixing="$3"
            local destination="$4"
            shift 4

            git init "$destination"
            git -C "$destination" remote add origin "https://github.com/${repository}.git"
            git -C "$destination" config core.sparseCheckout true
            : > "$destination/.git/info/sparse-checkout"
            for pattern in "$@"; do
              printf '%s\n' "$pattern" >> "$destination/.git/info/sparse-checkout"
            done

            git -C "$destination" fetch --depth=100 --filter=blob:none origin "$fixing"
            git -C "$destination" cat-file -e "${defective}^{commit}"
            git -C "$destination" cat-file -e "${fixing}^{commit}"
            git -C "$destination" checkout --detach "$defective"
            test "$(git -C "$destination" rev-parse HEAD)" = "$defective"
          }

          sparse_lineage_checkout \
            rootlyhq/rootly-cli \
            826a2f537c1d722d32cd1ed8f613cf5be2fc1fcd \
            d47bd9d208501b961fa2b6691f55347c975e16b3 \
            transfer-12/rootly-cli \
            '/internal/api/client.go'

          sparse_lineage_checkout \
            VincentShipsIt/macsweep.dev \
            015475aa3b231fb6adf1cc570e1cd10285f74f32 \
            1005ec6b6ef08a11ff8eb0a1b520994f000bae05 \
            transfer-12/macsweep \
            '/MacSweep/Sources/Core/Services/LoginItemEnumerator.swift'

          sparse_lineage_checkout \
            gabrielassisxyz/kernl \
            422b365f6404013887b1d7d7ac74c60cb9790fbd \
            3500e5bf28d4d13f3b962a607f7845050bc7de18 \
            transfer-12/kernl \
            '/cmd/kernl/project.go'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure isolated provider state
        shell: bash
        run: echo "SERGEANT_CLOUDFLARE_USAGE_STATE=${RUNNER_TEMP}/sergeant-transfer-12-usage.json" >> "$GITHUB_ENV"

      - name: Install frozen Sergeant package
        run: python -m pip install .

      - name: Build provenance-bound opaque runtime manifest
        shell: bash
        run: |
          mkdir -p build/model-free-core-transfer-12
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = {
              "schema_version": "sergeant.review-training.v1",
              "set_id": "model-free-core-transfer-12",
              "purpose": "Twelfth untouched transfer validation across three new repositories and semantic classes. Expected roots remain outside Sergeant input.",
              "rules": {
                  "models_enabled": False,
                  "workspace_default": "none",
                  "expected_defects_visible_to_sergeant": False,
                  "runtime_is_confirmation_not_discovery": True,
                  "classification": "untouched_transfer_validation",
                  "provenance_required": True,
                  "provenance_contract": "sergeant.training-provenance.v1",
                  "reviewer_code_frozen_before_target_selection": "d58048a3c4d26607f6f21f12294ef0d1289a3bdf",
              },
              "cases": [
                  {
                      "case_id": "transfer-12-a",
                      "repository": "rootlyhq/rootly-cli",
                      "source_pr": 46,
                      "checkout_path": "transfer-12/rootly-cli",
                      "defective_ref": "826a2f537c1d722d32cd1ed8f613cf5be2fc1fcd",
                      "fixing_ref": "d47bd9d208501b961fa2b6691f55347c975e16b3",
                      "changed_files": ["internal/api/client.go"],
                      "context_files": [],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-12-b",
                      "repository": "VincentShipsIt/macsweep.dev",
                      "source_pr": 255,
                      "checkout_path": "transfer-12/macsweep",
                      "defective_ref": "015475aa3b231fb6adf1cc570e1cd10285f74f32",
                      "fixing_ref": "1005ec6b6ef08a11ff8eb0a1b520994f000bae05",
                      "changed_files": ["MacSweep/Sources/Core/Services/LoginItemEnumerator.swift"],
                      "context_files": [],
                      "workspace_policy": "static_first",
                  },
                  {
                      "case_id": "transfer-12-c",
                      "repository": "gabrielassisxyz/kernl",
                      "source_pr": 109,
                      "checkout_path": "transfer-12/kernl",
                      "defective_ref": "422b365f6404013887b1d7d7ac74c60cb9790fbd",
                      "fixing_ref": "3500e5bf28d4d13f3b962a607f7845050bc7de18",
                      "changed_files": ["cmd/kernl/project.go"],
                      "context_files": [],
                      "workspace_policy": "static_first",
                  },
              ],
          }
          Path("build/model-free-core-transfer-12/runtime-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Validate frozen lineage and run normal pr-review
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_static_training_set.py \
            build/model-free-core-transfer-12/runtime-manifest.json \
            --output build/model-free-core-transfer-12/frozen-result.json \
            2>&1 | tee build/model-free-core-transfer-12/frozen-summary.json

      - name: Publish frozen transfer summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Model-free Sergeant core — transfer 12"
            echo
            echo "Workflow event head: \`${GITHUB_SHA}\`"
            echo
            echo "Frozen reviewer head: \`d58048a3c4d26607f6f21f12294ef0d1289a3bdf\`"
            echo
            echo '```json'
            cat build/model-free-core-transfer-12/frozen-summary.json 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable transfer reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-free-core-transfer-12
          path: build/model-free-core-transfer-12/
          if-no-files-found: error
          retention-days: 90
