name: Cloudflare Connector Proof

on:
  pull_request:
    paths:
      - "main_review/cloudflare_*.py"
      - "tests/test_cloudflare_gateway.py"
      - "docs/25-cloudflare-workers-ai.md"
      - "pyproject.toml"
      - ".github/workflows/cloudflare-connector-proof.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-connector-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-contract:
    name: Deterministic connector contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install source package
        run: python -m pip install --upgrade pip pytest build && python -m pip install -e .

      - name: Run focused connector tests
        run: python -m pytest tests/test_cloudflare_gateway.py -q

      - name: Prove missing credentials stay redacted
        run: |
          set +e
          sergeant-cloudflare --pretty status --require > cloudflare-status.json
          code=$?
          set -e
          test "$code" -eq 2
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("cloudflare-status.json").read_text())
          assert payload["valid"] is False
          assert payload["api_token_present"] is False
          assert "api_token" not in payload
          assert "secret" not in json.dumps(payload).lower()
          PY

      - name: Build wheel and source archive
        run: python -m build

      - name: Prove installed wheel command
        run: |
          python -m venv .wheel-proof
          .wheel-proof/bin/python -m pip install dist/*.whl
          set +e
          .wheel-proof/bin/sergeant-cloudflare --pretty status --require > installed-status.json
          code=$?
          set -e
          test "$code" -eq 2
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("installed-status.json").read_text())
          assert payload["provider"] == "cloudflare-workers-ai"
          assert payload["valid"] is False
          PY

      - name: Upload proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-connector-proof
          path: |
            cloudflare-status.json
            installed-status.json
            dist/*
          if-no-files-found: error
          retention-days: 14

# Live Workers AI calls are deliberately excluded from pull-request CI because
# provider credentials belong to the operator. After configuring a scoped token,
# run `sergeant-cloudflare test-models --require` and `council-proof` locally or
# from a protected private deployment workflow. Rollback is deletion of this
# connector module, CLI entrypoint and workflow; Sergeant Core remains usable.
