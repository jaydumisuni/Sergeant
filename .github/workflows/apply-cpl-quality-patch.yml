name: Apply Cpl Quality Patch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-cpl-quality-patch.yml'
      - 'tools/apply_cpl_quality_patch.py'
      - 'main_review/cpl_noise.py'
      - 'tests/test_cpl_noise_governor.py'

permissions:
  contents: write

jobs:
  construct:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply product patch
        run: python tools/apply_cpl_quality_patch.py

      - name: Compile changed modules
        run: |
          python -m py_compile \
            main_review/cpl_noise.py \
            main_review/llm_review.py \
            main_review/cpl_runtime.py \
            main_review/pr_reviewer.py \
            main_review/review_benchmark.py

      - name: Run focused regression proof
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install -e .
          python -m pytest \
            tests/test_cpl_noise_governor.py \
            tests/test_review_benchmark.py \
            tests/test_pr_reviewer.py \
            tests/test_cloudflare_certification_semantics.py \
            -q

      - name: Commit constructed product changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            main_review/cpl_noise.py \
            main_review/llm_review.py \
            main_review/cpl_runtime.py \
            main_review/pr_reviewer.py \
            main_review/review_benchmark.py \
            tests/test_cpl_noise_governor.py
          if git diff --cached --quiet; then
            echo 'Product patch already applied.'
            exit 0
          fi
          git commit -m 'Govern Cpl noise and reroute failed model passes'
          git push origin HEAD:${{ github.head_ref }}
