name: Multiplatform Proof

on:
  pull_request:
    paths:
      - "package.json"
      - "pyproject.toml"
      - "src/vscode/**"
      - "resources/sergeant-command-center-v2.*"
      - "main_review/**"
      - "adapters/jetbrains/**"
      - "tests/**"
      - ".github/workflows/multiplatform-proof.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-and-vscode:
    name: Python package and VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install build and test tools
        run: python -m pip install --upgrade build twine pytest
      - name: Run tests
        run: python -m pytest -q
      - name: Syntax-check VS Code runtime
        run: |
          node --check src/vscode/extension.js
          node --check src/vscode/actions.js
          node --check src/vscode/command-center.js
          node --check src/vscode/results.js
          node --check resources/sergeant-command-center-v2.js
      - name: Build and verify PyPI artifacts
        run: |
          python -m build
          python -m twine check dist/*
      - name: Verify coordinated versions
        run: |
          python - <<'PY'
          import json, pathlib, tomllib
          npm = json.loads(pathlib.Path("package.json").read_text())["version"]
          py = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          jetbrains = next(
              line.split("=", 1)[1].strip()
              for line in pathlib.Path("adapters/jetbrains/gradle.properties").read_text().splitlines()
              if line.startswith("pluginVersion=")
          )
          assert npm == py == "0.3.2", (npm, py)
          assert jetbrains == "0.3.2-preview", jetbrains
          PY
      - name: Package VS Code extension
        run: npx --yes @vscode/vsce@latest package --no-dependencies --out sergeant-reviewer-0.3.2.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: sergeant-0.3.2-python-vscode
          path: |
            dist/*
            sergeant-reviewer-0.3.2.vsix

  jetbrains:
    name: JetBrains plugin preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.0.0"
      - name: Build JetBrains plugin
        run: gradle -p adapters/jetbrains clean buildPlugin
      - name: Verify JetBrains package and Command Center resources
        shell: bash
        run: |
          PACKAGE=$(find adapters/jetbrains/build/distributions -maxdepth 1 -type f -name '*.zip' -print -quit)
          test -n "$PACKAGE"
          unzip -l "$PACKAGE" | grep -q 'sergeant-command-center-v2.html'
          unzip -l "$PACKAGE" | grep -q 'sergeant-command-center-v2.css'
          unzip -l "$PACKAGE" | grep -q 'sergeant-command-center-v2.js'
      - uses: actions/upload-artifact@v4
        with:
          name: sergeant-0.3.2-jetbrains-preview
          path: adapters/jetbrains/build/distributions/*.zip
          if-no-files-found: error
