name: Temporary PR 102 Final Thread Repair

on:
  push:
    branches: [cpl-quality-noise-governor]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cpl-quality-noise-governor
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply generalized reviewer-thread repairs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one match in {path}, found {count}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "main_review/cpl_council.py",
              '''            r"privileged(?:\\s+\\w+){0,2}\\s+route.*without)",''',
              '''            r"privileged(?:\\s+\\w+){0,2}\\s+route[^\\n]{0,80}"
                          r"without[^\\n]{0,40}(?:authentication|authorization|access\\s+control|guard))",''',
          )

          replace_once(
              "main_review/llm_review.py",
              '''    raise LLMProviderError(
                  "No configured Cpl council model completed the required structured officer pass"
                  f"{suffix}."
              )''',
              '''    exhausted = LLMProviderError(
                  "No configured Cpl council model completed the required structured officer pass"
                  f"{suffix}."
              )
              exhausted.failed_models = tuple(failed_models)
              raise exhausted''',
          )
          replace_once(
              "main_review/llm_review.py",
              '''        completed_plan.append({**assignment.to_dict(), "model": specialist_route.model})
                  try:''',
              '''        plan_entry = {**assignment.to_dict(), "model": specialist_route.model}
                  completed_plan.append(plan_entry)
                  try:''',
          )
          replace_once(
              "main_review/llm_review.py",
              '''            if failed_models:
                          route_failovers.append({
                              "pass": assignment.specialist,
                              "failed_models": failed_models,
                              "completed_by": completed_route.model,
                          })
                      passes.append(_validate_pass(payload, files, route=completed_route, assignment=assignment))''',
              '''            plan_entry["model"] = completed_route.model
                      if failed_models:
                          route_failovers.append({
                              "pass": assignment.specialist,
                              "failed_models": failed_models,
                              "completed_by": completed_route.model,
                          })
                      passes.append(_validate_pass(payload, files, route=completed_route, assignment=assignment))''',
          )
          replace_once(
              "main_review/llm_review.py",
              '''        except LLMProviderError as error:
                      errors.append(f"{assignment.specialist}: {error}")''',
              '''        except LLMProviderError as error:
                      attempted_models = list(getattr(error, "failed_models", ()))
                      if attempted_models:
                          route_failovers.append({
                              "pass": assignment.specialist,
                              "failed_models": attempted_models,
                              "completed_by": None,
                          })
                      errors.append(f"{assignment.specialist}: {error}")''',
          )

          replace_once(
              "main_review/cpl_runtime.py",
              '''    raise LLMProviderError(
                  "No configured Cpl council model completed the follow-up officer pass"
                  f"{suffix}."
              )''',
              '''    exhausted = LLMProviderError(
                  "No configured Cpl council model completed the follow-up officer pass"
                  f"{suffix}."
              )
              exhausted.failed_models = tuple(failed_models)
              raise exhausted''',
          )
          replace_once(
              "main_review/cpl_runtime.py",
              '''            selected_model = completed_route.model
                      recruited["model"] = selected_model
                      if failed_models:
                          recruited["failover_from"] = failed_models
                      officer_report = _validate_pass(payload, files, route=completed_route, assignment=assignment)''',
              '''            selected_model = completed_route.model
                      recruited["model"] = selected_model
                      _, admission = _choose_model([selected_model], used, selected_model, member_limit)
                      recruited["admission"] = admission
                      recruited["selection_score"] = model_score(selected_model, experience, specialist)
                      if failed_models:
                          recruited["failover_from"] = failed_models
                      officer_report = _validate_pass(payload, files, route=completed_route, assignment=assignment)''',
          )
          replace_once(
              "main_review/cpl_runtime.py",
              '''        except LLMProviderError as error:
                      errors.append(f"council round {round_number} / {specialist}: {error}")''',
              '''        except LLMProviderError as error:
                      attempted_models = list(getattr(error, "failed_models", ()))
                      if attempted_models:
                          recruited["failover_from"] = attempted_models
                      errors.append(f"council round {round_number} / {specialist}: {error}")''',
          )

          Path("tests/test_pr102_final_review_threads.py").write_text('''from __future__ import annotations

from dataclasses import replace
from typing import Any

import pytest

from main_review import cpl_runtime, llm_review
from main_review.cpl_council import finding_root_cause
from main_review.cpl_reasoning import SPECIALISTS
from main_review.llm_provider import LLMProviderError, LLMRoute, LLMSettings


def route() -> LLMRoute:
    return LLMRoute(
        provider="cloudflare",
        base_url="https://example.invalid/v1",
        model="model-a",
        protocol="chat_completions",
        discovered_models=("model-a", "model-b"),
    )


def settings() -> LLMSettings:
    return LLMSettings(
        enabled=True,
        policy="preferred",
        provider="cloudflare",
        base_url="https://example.invalid/v1",
        model="model-a",
        protocol="chat_completions",
        api_key="",
        timeout_seconds=1.0,
        max_output_tokens=256,
    )


def valid_payload(path: str = "src/app.py") -> dict[str, Any]:
    return {
        "verdict": "PASS",
        "confidence": 0.9,
        "summary": "No defect found.",
        "findings": [],
        "unanswered_questions": [],
        "coverage": {"files_reviewed": [path], "areas": ["logic"]},
    }


def test_authorization_root_requires_an_authorization_object() -> None:
    unrelated = {
        "message": "Privileged reporting route without pagination returns every row.",
        "evidence": "route without pagination",
    }
    genuine = {
        "message": "Privileged admin route without an authorization guard.",
        "evidence": "route without authorization guard",
    }

    assert finding_root_cause(unrelated) == ""
    assert finding_root_cause(genuine) == "authorization-gap"


def test_exhausted_primary_failover_preserves_all_attempted_models(monkeypatch: pytest.MonkeyPatch) -> None:
    def fail(candidate: LLMRoute, *, system_prompt: str, user_prompt: str) -> dict[str, Any]:
        raise LLMProviderError(f"{candidate.model} unavailable")

    monkeypatch.setattr(llm_review, "invoke_json", fail)
    with pytest.raises(LLMProviderError) as captured:
        llm_review._invoke_json_with_failover(route(), system_prompt="system", user_prompt="user")

    assert captured.value.failed_models == ("model-a", "model-b")


def test_exhausted_followup_failover_preserves_all_attempted_models(monkeypatch: pytest.MonkeyPatch) -> None:
    def fail(candidate: LLMRoute, *, system_prompt: str, user_prompt: str) -> dict[str, Any]:
        raise LLMProviderError(f"{candidate.model} unavailable")

    monkeypatch.setattr(cpl_runtime, "invoke_json", fail)
    with pytest.raises(LLMProviderError) as captured:
        cpl_runtime._invoke_follow_up_with_failover(route(), system_prompt="system", user_prompt="user")

    assert captured.value.failed_models == ("model-a", "model-b")


def test_reasoning_plan_names_the_model_that_completed_after_failover(
    monkeypatch: pytest.MonkeyPatch,
    tmp_path,
) -> None:
    source = tmp_path / "src" / "app.py"
    source.parent.mkdir()
    source.write_text("def ok():\\n    return True\\n", encoding="utf-8")
    calls = 0

    def fake_invoke(
        selected: LLMRoute,
        *,
        system_prompt: str,
        user_prompt: str,
    ) -> tuple[dict[str, Any], LLMRoute, list[str]]:
        nonlocal calls
        calls += 1
        if calls == 1:
            return valid_payload(), replace(selected, model="model-primary"), []
        return valid_payload(), replace(selected, model="model-b"), ["model-a"]

    monkeypatch.setattr(llm_review, "_invoke_json_with_failover", fake_invoke)
    monkeypatch.setattr(
        llm_review,
        "plan_cpl_assignments",
        lambda changed_files, deterministic_context, primary_verdict: [SPECIALISTS["correctness"]],
    )
    monkeypatch.setattr(
        llm_review,
        "route_for_assignment",
        lambda selected, assignment, used_models: replace(
            selected,
            model="model-a",
            discovered_models=("model-a", "model-b"),
        ),
    )

    result = llm_review.run_cpl_review(
        tmp_path,
        ["src/app.py"],
        {},
        settings=settings(),
        route=route(),
    )

    assert result["reasoning_plan"][0]["model"] == "model-b"
    assert result["route_failovers"][-1] == {
        "pass": "correctness",
        "failed_models": ["model-a"],
        "completed_by": "model-b",
    }


def test_runtime_recruitment_recomputes_completed_model_metadata(monkeypatch: pytest.MonkeyPatch, tmp_path) -> None:
    base = {
        "status": "completed",
        "verdict": "PASS",
        "passes": [{"model": "model-a", "specialist": "generalist", **valid_payload()}],
        "reasoning_plan": [],
        "errors": [],
    }
    monkeypatch.setattr(cpl_runtime, "retrieve_experience", lambda *args, **kwargs: {"events": [], "canonical_lessons": [], "profiles": {}})
    monkeypatch.setattr(cpl_runtime, "run_cpl_review_once", lambda *args, **kwargs: dict(base))
    monkeypatch.setattr(cpl_runtime, "max_rounds", lambda: 2)
    monkeypatch.setattr(cpl_runtime, "max_members", lambda: 5)
    monkeypatch.setattr(
        cpl_runtime,
        "_all_gaps",
        lambda passes, plan, errors, models, experience: [] if len(passes) > 1 else [{
            "type": "missing_report",
            "specialist": "correctness",
            "officer": "Engineer",
            "reason": "Need an independent correctness pass.",
        }],
    )
    monkeypatch.setattr(cpl_runtime, "rank_models", lambda models, experience, specialist=None: ["model-a", "model-b"])
    monkeypatch.setattr(cpl_runtime, "model_score", lambda model, experience, specialist=None: 0.9 if model == "model-b" else 0.1)
    monkeypatch.setattr(cpl_runtime, "collect_changed_file_excerpts", lambda *args, **kwargs: ({"src/app.py": "return True"}, {"src/app.py": "1: return True"}))
    monkeypatch.setattr(cpl_runtime, "_build_user_prompt", lambda *args, **kwargs: "prompt")
    monkeypatch.setattr(
        cpl_runtime,
        "_invoke_follow_up_with_failover",
        lambda selected, **kwargs: (valid_payload(), replace(selected, model="model-b"), ["model-a"]),
    )

    result = cpl_runtime.run_cpl_review(
        tmp_path,
        ["src/app.py"],
        {},
        settings=settings(),
        route=route(),
    )
    recruited = result["council"]["recruitment"][0]

    assert recruited["model"] == "model-b"
    assert recruited["admission"] == "new_member"
    assert recruited["selection_score"] == 0.9
    assert recruited["failover_from"] == ["model-a"]
''', encoding="utf-8")
          PY
      - name: Run focused regression proof
        run: |
          python -m pip install -e '.[dev]'
          python -m pytest -q tests/test_pr102_final_review_threads.py tests/test_cpl_noise_governor.py
      - name: Commit production repair and remove constructor
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "THETECHGUY Engineering"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/temporary-pr102-final-thread-repair.yml
          git add main_review/cpl_council.py main_review/llm_review.py main_review/cpl_runtime.py tests/test_pr102_final_review_threads.py
          git commit -m "Resolve final reviewer audit and matching gaps"
          git push origin HEAD:cpl-quality-noise-governor
