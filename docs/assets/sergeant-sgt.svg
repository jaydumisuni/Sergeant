<svg width="1400" height="1650" viewBox="0 0 1400 1650" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Sergeant README hero</title>
<desc id="desc">SGT. Sergeant open-source engineering reviewer by THETECHGUY DIGITAL SOLUTIONS.</desc>
<defs><linearGradient id="brand" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#a855f7"/><stop offset=".55" stop-color="#168cff"/><stop offset="1" stop-color="#5ee6ff"/></linearGradient><linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0a0d18"/><stop offset="1" stop-color="#030408"/></linearGradient><filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="9" result="b"/><feColorMatrix in="b" type="matrix" values="0 0 0 0 .35 0 0 0 0 .65 0 0 0 0 1 0 0 0 .75 0"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.line{stroke:#1f2937;stroke-width:1.5}.muted{fill:#b7c3d8}.text{fill:#f5f7fb;font-family:Inter,Segoe UI,Arial,sans-serif}.small{font-size:19px}.body{font-size:23px}.h2{font-size:34px;font-weight:800}.title{font-size:96px;font-weight:900}.mono{font-family:SFMono-Regular,Consolas,Menlo,monospace}.ok{fill:#49f26d}.bad{fill:#ff4d5c}.blue{fill:#40a7ff}.purple{fill:#a855f7}</style></defs>
<rect width="1400" height="1650" fill="#020306"/><circle cx="1120" cy="90" r="230" fill="#1597ff" opacity=".11"/><circle cx="120" cy="140" r="230" fill="#a855f7" opacity=".10"/>
<rect x="32" y="38" width="195" height="195" rx="28" fill="#060912" stroke="url(#brand)" stroke-width="4"/>
<g transform="translate(62 65) scale(.55)" filter="url(#glow)"><path d="M80 160C80 89 138 32 210 32s130 57 130 128c0 48-27 90-66 112l-63 35-64-36c-40-22-67-64-67-111Z" fill="#07101f" stroke="url(#brand)" stroke-width="8"/><path d="M126 126c16-56 55-80 84-80s68 24 84 80c-31-14-57-20-84-20s-53 6-84 20Z" fill="#111827" stroke="#65758b" stroke-width="5"/><path d="M144 142h132c-6 39-31 71-66 71s-60-32-66-71Z" fill="#030408"/><rect x="146" y="150" width="48" height="16" rx="8" fill="#f8fafc"/><rect x="226" y="150" width="48" height="16" rx="8" fill="#f8fafc"/><path d="M194 158h32" stroke="#f8fafc" stroke-width="7" stroke-linecap="round"/><path d="M165 110l44-18 45 18" stroke="url(#brand)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/><path d="M176 84l33-14 34 14" stroke="url(#brand)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/></g>
<text x="270" y="120" class="text title" fill="url(#brand)">Sergeant</text><text x="274" y="178" class="text" font-size="35" font-weight="800">Open-source engineering reviewer.</text><text x="58" y="288" class="text body">Sergeant helps developers review repositories and pull requests</text><text x="58" y="324" class="text body">before code is merged. It analyzes changes, identifies risks, and</text><text x="58" y="360" class="text body">provides evidence-based review decisions so teams build with confidence.</text>
<g transform="translate(850 48) scale(1.55)" filter="url(#glow)"><path d="M80 160C80 89 138 32 210 32s130 57 130 128c0 48-27 90-66 112l-63 35-64-36c-40-22-67-64-67-111Z" fill="#07101f" stroke="url(#brand)" stroke-width="8"/><path d="M126 126c16-56 55-80 84-80s68 24 84 80c-31-14-57-20-84-20s-53 6-84 20Z" fill="#111827" stroke="#65758b" stroke-width="5"/><path d="M144 142h132c-6 39-31 71-66 71s-60-32-66-71Z" fill="#030408"/><rect x="146" y="150" width="48" height="16" rx="8" fill="#f8fafc"/><rect x="226" y="150" width="48" height="16" rx="8" fill="#f8fafc"/><path d="M194 158h32" stroke="#f8fafc" stroke-width="7" stroke-linecap="round"/><rect x="215" y="64" width="78" height="45" rx="8" fill="#060912" stroke="#293241"/><text x="254" y="94" text-anchor="middle" class="text" font-size="28" font-weight="900" fill="url(#brand)">SGT</text><text x="254" y="109" text-anchor="middle" class="text" font-size="9" font-weight="800">THETECHGUY</text><path d="M165 110l44-18 45 18" stroke="url(#brand)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/><path d="M176 84l33-14 34 14" stroke="url(#brand)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/></g>
<g transform="translate(58 405)"><rect width="150" height="64" rx="8" fill="#07150c" stroke="#28c45f"/><text x="60" y="42" class="text" font-size="27" font-weight="800" fill="#49f26d">PASS</text><circle cx="32" cy="32" r="19" fill="#49f26d"/><text x="32" y="41" text-anchor="middle" class="text" font-size="25" font-weight="900" fill="#041008">✓</text></g><g transform="translate(228 405)"><rect width="226" height="64" rx="8" fill="#181205" stroke="#d99a18"/><text x="68" y="42" class="text" font-size="27" font-weight="800" fill="#f7c843">NEEDS WORK</text><path d="M31 13l25 42H7l24-42Z" fill="none" stroke="#f7c843" stroke-width="5"/><text x="31" y="48" text-anchor="middle" class="text" font-size="28" font-weight="900" fill="#f7c843">!</text></g><g transform="translate(482 405)"><rect width="160" height="64" rx="8" fill="#1a090b" stroke="#ff4d5c"/><text x="72" y="42" class="text" font-size="27" font-weight="800" fill="#ff4d5c">BLOCK</text><path d="M30 13l17 7 7 17-7 17-17 7-17-7-7-17 7-17 17-7Z" fill="#ff4d5c"/></g>
<text x="58" y="535" class="text body">Created by <tspan fill="#40a7ff" font-weight="900">THETECHGUY</tspan> <tspan fill="#a855f7" font-weight="900">DIGITAL SOLUTIONS</tspan></text><text x="58" y="572" class="muted small">Building tools that help engineers build better.</text><line x1="34" y1="630" x2="1366" y2="630" class="line"/>
<text x="58" y="680" class="text h2">☆ Features</text><g class="text small"><text x="70" y="730">▣ Repository Review</text><text x="70" y="768">⌬ Pull Request &amp; Diff Review</text><text x="70" y="806">⌘ Cross-file Dependency Analysis</text><text x="70" y="844">▥ Architecture Review</text><text x="410" y="730">⌁ Data-flow Analysis</text><text x="410" y="768">◈ Security Analysis</text><text x="410" y="806">&lt;/&gt; API Contract Verification</text><text x="410" y="844">◷ Performance Analysis</text><text x="760" y="730">⚗ Test Impact Analysis</text><text x="760" y="768">↗ Regression Prediction</text><text x="760" y="806">▣ Secret Detection</text><text x="760" y="844">▤ Documentation Verification</text><text x="1080" y="730">◎ Multi-language Support</text><text x="1080" y="768">▤ Evidence-based Reports</text><text x="1080" y="806">◇ Evidence Consensus</text><text x="1080" y="844">✓ Battle-test Validation</text></g><line x1="34" y1="890" x2="1366" y2="890" class="line"/>
<g transform="translate(34 925)"><rect width="405" height="345" rx="12" fill="url(#panel)" stroke="#263244"/><text x="30" y="52" class="text h2">↗ Works With</text><text x="30" y="94" class="muted small">Platforms</text><text x="36" y="150" class="text small">● GitHub</text><text x="36" y="190" class="text small">● VS Code</text><text x="36" y="230" class="text small">● JetBrains IDEs</text><text x="30" y="278" class="muted small">Compatible With</text><text x="36" y="318" class="text small">Claude • Codex • Copilot • Cursor • Gemini • Local LLMs</text></g><g transform="translate(468 925)"><rect width="460" height="345" rx="12" fill="url(#panel)" stroke="#263244"/><text x="30" y="52" class="text h2">&gt;_ Quick Start</text><text x="30" y="95" class="muted small">Review the current repository:</text><rect x="30" y="112" width="390" height="42" rx="8" fill="#101621"/><text x="48" y="140" class="text mono small">main-review review . --pretty</text><text x="30" y="185" class="muted small">Review a pull request:</text><rect x="30" y="202" width="390" height="58" rx="8" fill="#101621"/><text x="48" y="229" class="text mono small">main-review app-review . --mode pull_request</text><text x="48" y="252" class="text mono small">--files &quot;src/app.py,tests/test_app.py&quot; --pretty</text><text x="30" y="293" class="muted small">Review live GitHub comments:</text><rect x="30" y="310" width="390" height="42" rx="8" fill="#101621"/><text x="48" y="338" class="text mono small">main-review live-github-comments owner/repo 12 --pretty</text></g><g transform="translate(956 925)"><rect width="410" height="345" rx="12" fill="url(#panel)" stroke="#263244"/><text x="30" y="52" class="text h2">◈ Safety</text><text x="30" y="94" class="muted small">Sergeant is a reviewer — not an execution engine.</text><text x="30" y="142" class="text small">It deliberately refuses to:</text><text x="34" y="190" class="bad small">✕ Execute untrusted pull request code</text><text x="34" y="230" class="bad small">✕ Automatically modify project code</text><text x="34" y="270" class="bad small">✕ Write patches by itself</text><text x="34" y="310" class="bad small">✕ Fabricate successful review results</text></g>
<g transform="translate(34 1305)"><rect width="405" height="220" rx="12" fill="url(#panel)" stroke="#263244"/><text x="30" y="52" class="text h2">▤ Documentation</text><text x="30" y="95" class="blue small">Getting Started</text><text x="30" y="130" class="blue small">Installation</text><text x="30" y="165" class="blue small">CLI Reference</text><text x="230" y="95" class="purple small">IDE Bench</text><text x="230" y="130" class="purple small">Battle Testing</text><text x="230" y="165" class="purple small">Security</text></g><g transform="translate(468 1305)"><rect width="460" height="220" rx="12" fill="url(#panel)" stroke="#263244"/><text x="30" y="52" class="text h2">⌁ Current Status</text><text x="30" y="92" class="muted small">Sergeant v1 foundation is complete and verified.</text><text x="30" y="128" class="ok small">✓ Live GitHub Review   ✓ App Bridge Integration</text><text x="30" y="160" class="ok small">✓ IDE Bench Contract   ✓ Verified Learning</text><text x="30" y="192" class="ok small">✓ Battle-test Framework   ✓ CI / Clean-clone Proof</text></g><g transform="translate(956 1305)"><rect width="410" height="220" rx="12" fill="url(#panel)" stroke="#263244"/><text x="30" y="52" class="text h2">♙ Contributing</text><text x="30" y="95" class="muted small">Contributions, issue reports, feature requests,</text><text x="30" y="124" class="muted small">and engineering discussions are welcome.</text><text x="30" y="176" class="blue small">Open an Issue →</text><text x="220" y="176" class="blue small">Submit a Pull Request →</text></g>
<line x1="34" y1="1552" x2="1366" y2="1552" class="line"/><text x="58" y="1605" class="text" font-size="42" font-weight="900" fill="url(#brand)">SGT.</text><text x="150" y="1605" class="text body">Sergeant</text><text x="545" y="1605" class="text body">★  Observe. Analyze. Verify.  ★</text><text x="1320" y="1605" text-anchor="end" class="text body">© THETECHGUY DIGITAL SOLUTIONS</text>
</svg>